<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM — Клиентская база</title>
    <style>
        /* ============================================================
           СОВРЕМЕННЫЙ МИНИМАЛИСТИЧНЫЙ ДИЗАЙН
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c0f;
            --bg-secondary: #12161b;
            --bg-card: #181e26;
            --bg-hover: #1f2630;
            --bg-input: #0f1318;
            --border-color: #282f3a;
            --border-light: #1e2430;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --text-muted: #4b5563;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Светлая тема */
        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f8fafc;
            --bg-input: #f1f5f9;
            --border-color: #e2e8f0;
            --border-light: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            transition: var(--transition);
            line-height: 1.5;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-size: 28px;
            filter: drop-shadow(0 0 12px var(--accent-glow));
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.1) rotate(-4deg);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 16px;
            border-radius: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            transition: var(--transition);
        }

        .dot.online { background: var(--success); box-shadow: 0 0 12px rgba(34, 197, 94, 0.3); }
        .dot.offline { background: var(--danger); box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
        .dot.loading { background: var(--warning); animation: pulse 1s infinite; }

        .theme-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-secondary);
        }

        /* ===== TOOLBAR ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            align-items: center;
            box-shadow: var(--shadow);
        }

        .toolbar .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .toolbar .search-wrap input {
            width: 100%;
            padding: 8px 16px 8px 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .toolbar .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toolbar .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .toolbar select,
        .toolbar input[type="number"],
        .toolbar input[type="date"] {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
            min-width: 100px;
        }

        .toolbar select:focus,
        .toolbar input[type="number"]:focus,
        .toolbar input[type="date"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toolbar select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .filter-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 30px var(--accent-glow); }

        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { filter: brightness(1.1); }

        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { filter: brightness(1.1); }

        .btn-warning { background: var(--warning); color: #fff; }
        .btn-warning:hover { filter: brightness(1.1); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: var(--bg-hover);
            border-color: var(--text-secondary);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 4px 8px;
        }
        .btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); border-radius: var(--radius-sm); }

        .save-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        .save-status .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        /* ===== TABLE ===== */
        .table-wrap {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: auto;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }

        th {
            background: var(--bg-input);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 2;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        th:hover { background: var(--bg-hover); }

        th .sort-icon {
            margin-left: 4px;
            opacity: 0.3;
            font-size: 10px;
        }
        th.sort-asc .sort-icon { opacity: 1; }
        th.sort-asc .sort-icon::after { content: '▲'; }
        th.sort-desc .sort-icon { opacity: 1; }
        th.sort-desc .sort-icon::after { content: '▼'; }

        th .col-actions {
            display: inline-flex;
            gap: 4px;
            margin-left: 8px;
        }

        th .col-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
            padding: 0 4px;
            transition: var(--transition);
        }

        th .col-actions button:hover { color: var(--danger); }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            transition: var(--transition);
        }

        tr:hover td { background: var(--bg-hover); }
        tr.selected td { background: var(--accent-glow); }

        /* Статусы */
        .status-cell {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-согласовано .status-cell { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .status-отказ .status-cell { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .status-вработе .status-cell { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .status-отправлено .status-cell { background: rgba(59, 130, 246, 0.15); color: var(--accent); }
        .status-черновик .status-cell { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }

        tr.status-согласовано td:first-child { border-left: 3px solid var(--success); }
        tr.status-отказ td:first-child { border-left: 3px solid var(--danger); }
        tr.status-вработе td:first-child { border-left: 3px solid var(--warning); }
        tr.status-отправлено td:first-child { border-left: 3px solid var(--accent); }
        tr.status-черновик td:first-child { border-left: 3px solid var(--text-muted); }

        /* Инпуты в таблице */
        .table-input {
            width: 100%;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
        }

        .table-input:hover { border-color: var(--border-color); background: var(--bg-input); }
        .table-input:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .table-select {
            width: 100%;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }

        .table-select:hover { border-color: var(--border-color); background: var(--bg-input); }
        .table-select:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .table-select option { background: var(--bg-secondary); color: var(--text-primary); }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            transition: var(--transition);
        }
        input[type="checkbox"]:hover { transform: scale(1.1); }

        .td-checkbox { text-align: center; width: 30px; }

        .action-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-btns .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
        }

        .action-btns .btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }
        .action-btns .btn-icon.danger:hover { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .action-btns .btn-icon.success:hover { background: rgba(34, 197, 94, 0.15); color: var(--success); }

        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-top: 20px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .footer .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer .stat-item {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .footer .stat-item strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .footer .stat-item .value {
            color: var(--accent);
            font-weight: 600;
        }

        .footer .mass-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .footer .mass-actions .selected-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer .mass-actions select {
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            font-family: inherit;
        }

        .footer .mass-actions select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji {
            font-size: 56px;
            display: block;
            margin-bottom: 16px;
            animation: pulse 2s infinite;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            font-size: 13px;
            backdrop-filter: blur(12px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px;
            max-width: 440px;
            width: 92%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        .modal-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-content label {
            display: block;
            margin: 10px 0 4px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .modal-content input:focus,
        .modal-content select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .modal-actions .btn { padding: 8px 20px; }

        .column-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }

        .column-settings label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 14px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            margin: 0;
            font-weight: 400;
        }

        .column-settings label:hover { background: var(--bg-hover); }

        .column-settings label input[type="checkbox"] {
            width: 14px;
            height: 14px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { flex-direction: column; align-items: stretch; padding: 14px; }
            .header h1 { font-size: 18px; }
            .header-right { justify-content: space-between; }

            .toolbar { flex-direction: column; align-items: stretch; padding: 12px 16px; }
            .toolbar .search-wrap { min-width: auto; }
            .toolbar select,
            .toolbar input[type="number"],
            .toolbar input[type="date"] { min-width: auto; width: 100%; }

            .filter-group { flex-wrap: wrap; }
            .filter-group label { width: 100%; }

            .footer { flex-direction: column; align-items: stretch; }
            .footer .mass-actions { margin-left: 0; flex-wrap: wrap; }

            /* Карточки на телефонах */
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                display: block;
                margin-bottom: 12px;
                border: 1px solid var(--border-color);
                border-radius: var(--radius);
                padding: 12px 14px;
                background: var(--bg-card);
            }
            tr:hover td { background: transparent; }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 0;
                border: none;
                border-bottom: 1px solid var(--border-light);
                gap: 12px;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label);
                font-weight: 500;
                color: var(--text-secondary);
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                min-width: 80px;
                flex-shrink: 0;
            }
            td .table-input,
            td .table-select {
                width: auto;
                flex: 1;
                text-align: right;
                padding: 2px 6px;
            }
            td .status-cell { font-size: 11px; padding: 2px 12px; }
            .td-checkbox { justify-content: center; }
            .td-checkbox::before { display: none; }
            .td-checkbox input[type="checkbox"] { width: 20px; height: 20px; }
            .action-btns { justify-content: flex-end; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 16px; }
            .badge { font-size: 10px; padding: 1px 10px; }
            .btn { font-size: 12px; padding: 6px 12px; }
            .footer .stats { gap: 12px; }
            .footer .stat-item { font-size: 12px; }
        }

        /* Scrollbar */
        .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: var(--bg-input); }
        .table-wrap::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <span class="logo">⚡</span>
            <h1>CRM</h1>
            <span class="badge" id="countBadge">0</span>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌓</button>
            <div class="status-indicator">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">Подключение...</span>
            </div>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <input type="text" id="filterInput" placeholder="Поиск по всем полям..." />
        </div>

        <select id="filterStatus">
            <option value="">Все статусы</option>
            <option value="Согласовано">✅ Согласовано</option>
            <option value="Отказ">❌ Отказ</option>
            <option value="В работе">⚡ В работе</option>
            <option value="Отправлено">📤 Отправлено</option>
            <option value="Черновик">📝 Черновик</option>
        </select>

        <div class="filter-group">
            <label>Сумма</label>
            <input type="number" id="filterAmountMin" placeholder="от" style="min-width:70px;" />
            <input type="number" id="filterAmountMax" placeholder="до" style="min-width:70px;" />
        </div>

        <div class="filter-group">
            <label>Дата</label>
            <input type="date" id="filterDateFrom" style="min-width:100px;" />
            <input type="date" id="filterDateTo" style="min-width:100px;" />
        </div>

        <button class="btn btn-primary" onclick="addRow()">➕ Добавить</button>
        <button class="btn btn-success" onclick="exportCSV()">📤 CSV</button>
        <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📥 Импорт</button>

        <div class="save-status">
            <span class="spinner" id="savingSpinner"></span>
            <span id="savingText">💾 Сохранено</span>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
        <table>
            <thead id="tableHead">
                <tr id="headerRow"></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10"><div class="empty-state"><span class="emoji">⏳</span><h3>Загрузка данных...</h3></div></td></tr>
            </tbody>
        </table>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="stats">
            <span class="stat-item">Всего: <strong id="rowCounter">0</strong></span>
            <span class="stat-item">Согласны: <strong id="agreedCounter">0</strong></span>
            <span class="stat-item">Общая сумма: <strong class="value" id="totalAmount">0</strong></span>
        </div>

        <div class="mass-actions" id="massActions" style="display:none;">
            <span class="selected-info">Выделено: <strong id="selectedCount">0</strong></span>
            <select id="massStatusSelect">
                <option value="">Изменить статус</option>
                <option value="Согласовано">Согласовано</option>
                <option value="Отказ">Отказ</option>
                <option value="В работе">В работе</option>
                <option value="Отправлено">Отправлено</option>
                <option value="Черновик">Черновик</option>
            </select>
            <button class="btn btn-warning btn-sm" onclick="massStatus()">Применить</button>
            <button class="btn btn-danger btn-sm" onclick="massDelete()">🗑 Удалить</button>
        </div>

        <div style="display:flex;gap:6px;margin-left:auto;">
            <button class="btn btn-outline btn-sm" onclick="exportToClipboard()">📋 Копировать</button>
            <button class="btn btn-outline btn-sm" onclick="showColumnSettings()">⚙️ Столбцы</button>
            <button class="btn btn-outline btn-sm" onclick="showAddColumnModal()">➕ Столбец</button>
        </div>
    </div>
</div>

<!-- MODALS -->
<div class="modal" id="addColumnModal">
    <div class="modal-content">
        <h3>➕ Добавить столбец</h3>
        <label>Название (ключ):</label>
        <input type="text" id="newColumnKey" placeholder="например: city" />
        <label>Отображаемое имя:</label>
        <input type="text" id="newColumnLabel" placeholder="например: Город" />
        <label>Тип данных:</label>
        <select id="newColumnType">
            <option value="text">Текст</option>
            <option value="number">Число</option>
            <option value="date">Дата</option>
            <option value="select">Выпадающий список</option>
            <option value="checkbox">Чекбокс</option>
        </select>
        <div id="selectOptionsContainer" style="display:none; margin-top:8px;">
            <label>Варианты (через запятую):</label>
            <input type="text" id="newColumnOptions" placeholder="например: Да,Нет,Возможно" />
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="addColumn()">Добавить</button>

    </div>
</div>

<div class="modal" id="columnSettingsModal">
    <div class="modal-content">
        <h3>⚙️ Настройка столбцов</h3>
        <div class="column-settings" id="columnSettingsList"></div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="closeModal()">Закрыть</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept=".csv" style="display:none" onchange="handleImport(event)" />

<script>
    // ================================================================
    // КОНФИГУРАЦИЯ
    // ================================================================
    var BIN_ID = '6a34730dda38895dfeda3121';
    var API_KEY = '$2a$10$euK6kkgJrxsrsI06lUXdu.Zyp1byoA3eVeev6S/Kiol96uQejCvKa';

    // ================================================================
    // СОСТОЯНИЕ
    // ================================================================
    var data = [];
    var nextId = 1;
    var isSaving = false;
    var saveTimeout = null;
    var isOnline = false;
    var sortColumn = null;
    var sortDirection = 1;
    var selectedIds = [];
    var visibleColumns = {};

    var columns = [
        { key: 'client', label: 'Клиент', type: 'text' },
        { key: 'proposal', label: 'КП', type: 'text' },
        { key: 'amount', label: 'Сумма', type: 'number' },
        { key: 'date', label: 'Дата КП', type: 'date' },
        { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
        { key: 'agreed', label: 'Согласен', type: 'checkbox' },
        { key: 'comment', label: 'Комментарий', type: 'text' },
        { key: 'phone', label: 'Телефон', type: 'text' },
        { key: 'email', label: 'Email', type: 'text' }
    ];

    columns.forEach(function(col) { visibleColumns[col.key] = true; });

    // ================================================================
    // QUIC-ФИКС ДЛЯ CHROME/EDGE
    // ================================================================
    var originalFetch = window.fetch;
    window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('api.jsonbin.io')) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Connection'] = 'close';
            var separator = url.includes('?') ? '&' : '?';
            url = url + separator + '_=' + Date.now();
            return originalFetch(url, options);
        }
        return originalFetch(url, options);
    };

    // ================================================================
    // ТЕМА
    // ================================================================
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('crm_theme', next);
    }

    function loadTheme() {
        var theme = localStorage.getItem('crm_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    }
    loadTheme();

    // ================================================================
    // ЗАГРУЗКА
    // ================================================================
    async function loadFromCloud() {
        try {
            setStatus('loading', 'Загрузка...');
            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest?cors=true', {
                headers: { 'X-Master-Key': API_KEY }
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            var result = await resp.json();
            var loaded = result.record;

            if (loaded && Array.isArray(loaded) && loaded.length > 0) {
                data = loaded;
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                });
                nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                isOnline = true;
                setStatus('online', 'Онлайн');
                render();
                saveToLocalStorage();
                showToast('✅ Загружено ' + data.length + ' записей', 'success');
                return;
            }
            loadFromLocalStorage();
        } catch (e) {
            console.warn('Облако недоступно:', e);
            isOnline = false;
            setStatus('offline', 'Офлайн');
            loadFromLocalStorage();
        }
    }

    // ================================================================
    // ЛОКАЛЬНОЕ ХРАНИЛИЩЕ
    // ================================================================
    function saveToLocalStorage() {
        try {
            localStorage.setItem('crm_data', JSON.stringify(data));
            localStorage.setItem('crm_nextId', String(nextId));
            localStorage.setItem('crm_columns', JSON.stringify(columns));
            localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
            document.getElementById('savingText').textContent = '💾 Сохранено';
            document.getElementById('savingSpinner').style.display = 'none';
        } catch (e) {
            console.error('Ошибка сохранения в localStorage:', e);
        }
    }

    function loadFromLocalStorage() {
        try {
            var stored = localStorage.getItem('crm_data');
            var storedId = localStorage.getItem('crm_nextId');
            var storedCols = localStorage.getItem('crm_columns');
            var storedVisible = localStorage.getItem('crm_visible_columns');

            if (storedVisible) {
                var parsedVisible = JSON.parse(storedVisible);
                if (parsedVisible) visibleColumns = parsedVisible;
            }

            if (storedCols) {
                var parsedCols = JSON.parse(storedCols);
                if (Array.isArray(parsedCols) && parsedCols.length > 0) {
                    columns = parsedCols;
                }
            }

            if (stored) {
                data = JSON.parse(stored);
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                });
                if (storedId) {
                    nextId = parseInt(storedId, 10);
                } else {
                    nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                }
                render();
                showToast('📁 Загружено из кеша', 'success');
                return;
            }
            resetData();
        } catch (e) {
            console.error('Ошибка загрузки из localStorage:', e);
            resetData();
        }
    }

    // ================================================================
    // СОХРАНЕНИЕ В ОБЛАКО
    // ================================================================
    async function saveToCloud() {
        if (isSaving) return;
        isSaving = true;
        showSaving(true, 'Сохранение...');

        try {
            var cleanData = data.map(function(row) {
                var clean = {};
                for (var key in row) {
                    if (row[key] === undefined || row[key] === null) clean[key] = '';
                    else if (typeof row[key] === 'string') {
                        clean[key] = row[key].replace(/[\x00-\x1F\x7F-\x9F]/g, '');
                    } else clean[key] = row[key];
                }
                return clean;
            });

            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '?cors=true', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(cleanData)
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            isSaving = false;
            isOnline = true;
            setStatus('online', 'Онлайн');
            showSaving(false, '💾 Сохранено');
            saveToLocalStorage();
            showToast('💾 Сохранено в облаке', 'success');
        } catch (e) {
            console.error('Ошибка сохранения:', e);
            isSaving = false;
            isOnline = false;
            setStatus('offline', 'Офлайн');
            showSaving(false, '📁 Локально');
            saveToLocalStorage();
            showToast('⚠️ Ошибка: сохранено локально', 'error');
        }
    }

    function scheduleSave() {
        clearTimeout(saveTimeout);
        showSaving(true, 'Сохранение...');
        saveTimeout = setTimeout(function() {
            if (isOnline) saveToCloud();
            else { saveToLocalStorage(); showSaving(false, '📁 Локально'); }
        }, 800);
    }

    // ================================================================
    // ИНДИКАТОРЫ
    // ================================================================
    function setStatus(type, text) {
        var dot = document.getElementById('statusDot');
        var el = document.getElementById('statusText');
        dot.className = 'dot';
        if (type === 'online') dot.classList.add('online');
        else if (type === 'offline') dot.classList.add('offline');
        else dot.classList.add('loading');
        el.textContent = text;
    }

    function showSaving(active, text) {
        document.getElementById('savingSpinner').style.display = active ? 'inline-block' : 'none';
        if (text) document.getElementById('savingText').textContent = text;
    }

    // ================================================================
    // РЕНДЕР
    // ================================================================
    function render() {
        var thead = document.getElementById('headerRow');
        var tbody = document.getElementById('tableBody');

        var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
        var filterStatus = document.getElementById('filterStatus').value;
        var filterAmountMin = parseFloat(document.getElementById('filterAmountMin').value);
        var filterAmountMax = parseFloat(document.getElementById('filterAmountMax').value);
        var filterDateFrom = document.getElementById('filterDateFrom').value;
        var filterDateTo = document.getElementById('filterDateTo').value;

        // Заголовки
        var headerHtml = '<th style="width:30px;"><input type="checkbox" onchange="toggleAllSelect(this.checked)" /></th>';
        columns.forEach(function(col) {
            if (visibleColumns[col.key] === false) return;
            var sortClass = '';
            if (sortColumn === col.key) {
                sortClass = sortDirection === 1 ? 'sort-asc' : 'sort-desc';
            }
            headerHtml += '<th class="' + sortClass + '" onclick="sortTable(\'' + col.key + '\')">' + col.label;
            headerHtml += '<span class="sort-icon"></span>';
            headerHtml += '<span class="col-actions"><button onclick="event.stopPropagation();removeColumn(\'' + col.key + '\')" title="Удалить">✕</button></span>';
            headerHtml += '</th>';
        });
        headerHtml += '<th style="width:100px;">Действия</th>';
        thead.innerHTML = headerHtml;

        // Фильтрация
        var filtered = data.filter(function(row) {
            var matchText = false;
            columns.forEach(function(col) {
                var val = row[col.key] || '';
                if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
            });
            var statusMatch = filterStatus === '' || row.status === filterStatus;
            var amountMatch = true;
            if (!isNaN(filterAmountMin) && row.amount < filterAmountMin) amountMatch = false;
            if (!isNaN(filterAmountMax) && row.amount > filterAmountMax) amountMatch = false;
            var dateMatch = true;
            if (filterDateFrom && row.date < filterDateFrom) dateMatch = false;
            if (filterDateTo && row.date > filterDateTo) dateMatch = false;
            return matchText && statusMatch && amountMatch && dateMatch;
        });

        // Сортировка
        if (sortColumn) {
            filtered.sort(function(a, b) {
                var valA = a[sortColumn] || '';
                var valB = b[sortColumn] || '';
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return -sortDirection;
                if (valA > valB) return sortDirection;
                return 0;
            });
        }

        if (!filtered.length) {
            var colCount = columns.filter(function(c) { return visibleColumns[c.key] !== false; }).length + 2;
            tbody.innerHTML = '<tr><td colspan="' + colCount + '"><div class="empty-state"><span class="emoji">📭</span><h3>Нет записей</h3></div></td></tr>';
            document.getElementById('countBadge').textContent = data.length;
            updateCounters();
            updateMassActions();
            return;
        }

        var html = '';
        filtered.forEach(function(row, idx) {
            var statusClass = (row.status || 'Черновик').toLowerCase().replace(/ /g, '');
            var isSelected = selectedIds.indexOf(row.id) !== -1;
            html += '<tr class="status-' + statusClass + (isSelected ? ' selected' : '') + '">';
            html += '<td class="td-checkbox"><input type="checkbox" ' + (isSelected ? 'checked' : '') + ' onchange="toggleSelect(' + row.id + ', this.checked)" /></td>';

            columns.forEach(function(col) {
                if (visibleColumns[col.key] === false) return;
                html += '<td data-label="' + col.label + '">';
                html += renderCell(row, col);
                html += '</td>';
            });

            html += '<td data-label="Действия"><div class="action-btns">';
            html += '<button class="btn-icon success" onclick="copyRow(' + row.id + ')" title="Копировать">📋</button>';
            html += '<button class="btn-icon danger" onclick="deleteRow(' + row.id + ')" title="Удалить">🗑</button>';
            html += '</div></td>';
            html += '</tr>';
        });

        tbody.innerHTML = html;
        document.getElementById('countBadge').textContent = data.length;
        updateCounters();
        updateMassActions();
    }

    function renderCell(row, col) {
        var value = row[col.key] !== undefined ? row[col.key] : '';
        var id = row.id;
        var key = col.key;

        switch(col.type) {
            case 'checkbox':
                var checked = value ? 'checked' : '';
                return '<input type="checkbox" ' + checked + ' onchange="updateField(' + id + ', \'' + key + '\', this.checked)" />';

            case 'select':
                var options = col.options || ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'];
                var html = '<select class="table-select" onchange="updateField(' + id + ', \'' + key + '\', this.value)">';
                options.forEach(function(opt) {
                    html += '<option value="' + opt + '" ' + (opt === value ? 'selected' : '') + '>' + opt + '</option>';
                });
                html += '</select>';
                return html;

            case 'number':
                return '<input class="table-input" type="number" value="' + (value || 0) + '" onchange="updateField(' + id + ', \'' + key + '\', Number(this.value))" />';

            case 'date':
                return '<input class="table-input" type="date" value="' + (value || '') + '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" />';

            default:
                if (key === 'status') {
                    var labels = {
                        'Согласовано': '✅ Согласовано',
                        'Отказ': '❌ Отказ',
                        'В работе': '⚡ В работе',
                        'Отправлено': '📤 Отправлено',
                        'Черновик': '📝 Черновик'
                    };
                    return '<span class="status-cell">' + (labels[value] || value) + '</span>';
                }
                return '<input class="table-input" type="text" value="' + escapeHtml(String(value)) + '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" />';
        }
    }

    function updateCounters() {
        document.getElementById('rowCounter').textContent = data.length;
        var agreedCount = data.filter(function(r) { return r.agreed === true; }).length;
        document.getElementById('agreedCounter').textContent = agreedCount;
        var total = data.reduce(function(sum, r) { return sum + (r.amount || 0); }, 0);
        document.getElementById('totalAmount').textContent = total.toLocaleString('ru-RU');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ================================================================
    // СОРТИРОВКА
    // ================================================================
    function sortTable(key) {
        if (sortColumn === key) {
            sortDirection *= -1;
        } else {
            sortColumn = key;
            sortDirection = 1;
        }
        render();
    }

    // ================================================================
    // ВЫДЕЛЕНИЕ И МАССОВЫЕ ДЕЙСТВИЯ
    // ================================================================
    function toggleSelect(id, checked) {
        if (checked) {
            if (selectedIds.indexOf(id) === -1) selectedIds.push(id);
        } else {
            selectedIds = selectedIds.filter(function(i) { return i !== id; });
        }
        render();
    }

    function toggleAllSelect(checked) {
        var filtered = getFilteredData();
        selectedIds = [];
        if (checked) {
            filtered.forEach(function(row) {
                if (selectedIds.indexOf(row.id) === -1) selectedIds.push(row.id);
            });
        }
        render();
    }

    function getFilteredData() {
        var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
        var filterStatus = document.getElementById('filterStatus').value;
        var filterAmountMin = parseFloat(document.getElementById('filterAmountMin').value);
        var filterAmountMax = parseFloat(document.getElementById('filterAmountMax').value);
        var filterDateFrom = document.getElementById('filterDateFrom').value;
        var filterDateTo = document.getElementById('filterDateTo').value;

        return data.filter(function(row) {
            var matchText = false;
            columns.forEach(function(col) {
                var val = row[col.key] || '';
                if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
            });
            var statusMatch = filterStatus === '' || row.status === filterStatus;
            var amountMatch = true;
            if (!isNaN(filterAmountMin) && row.amount < filterAmountMin) amountMatch = false;
            if (!isNaN(filterAmountMax) && row.amount > filterAmountMax) amountMatch = false;
            var dateMatch = true;
            if (filterDateFrom && row.date < filterDateFrom) dateMatch = false;
            if (filterDateTo && row.date > filterDateTo) dateMatch = false;
            return matchText && statusMatch && amountMatch && dateMatch;
        });
    }

    function updateMassActions() {
        var el = document.getElementById('massActions');
        var count = selectedIds.length;
        document.getElementById('selectedCount').textContent = count;
        if (count > 0) {
            el.style.display = 'flex';
        } else {
            el.style.display = 'none';
        }
    }

    function massDelete() {
        if (!selectedIds.length) return;
        if (!confirm('Удалить ' + selectedIds.length + ' записей?')) return;
        data = data.filter(function(r) { return selectedIds.indexOf(r.id) === -1; });
        selectedIds = [];
        render();
        scheduleSave();
        showToast('🗑️ Удалено записей: ' + (data.length - selectedIds.length), 'success');
    }

    function massStatus() {
        if (!selectedIds.length) return;
        var status = document.getElementById('massStatusSelect').value;
        if (!status) { showToast('Выберите статус', 'error'); return; }
        var count = selectedIds.length;
        data.forEach(function(r) {
            if (selectedIds.indexOf(r.id) !== -1) r.status = status;
        });
        selectedIds = [];
        render();
        scheduleSave();
        showToast('📝 Статус обновлён для ' + count + ' записей', 'success');
    }

    // ================================================================
    // УПРАВЛЕНИЕ СТОЛБЦАМИ
    // ================================================================
    function showColumnSettings() {
        var modal = document.getElementById('columnSettingsModal');
        var list = document.getElementById('columnSettingsList');
        var html = '';
        columns.forEach(function(col) {
            var checked = visibleColumns[col.key] !== false ? 'checked' : '';
            html += '<label><input type="checkbox" ' + checked + ' onchange="toggleColumnVisibility(\'' + col.key + '\', this.checked)" /> ' + col.label + '</label>';
        });
        list.innerHTML = html;
        modal.classList.add('active');
    }

    function toggleColumnVisibility(key, visible) {
        visibleColumns[key] = visible;
        localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
        render();
    }

    function showAddColumnModal() {
        document.getElementById('addColumnModal').classList.add('active');
        document.getElementById('newColumnKey').value = '';
        document.getElementById('newColumnLabel').value = '';
        document.getElementById('newColumnType').value = 'text';
        document.getElementById('selectOptionsContainer').style.display = 'none';
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(function(m) { m.classList.remove('active'); });
    }

    document.getElementById('newColumnType').addEventListener('change', function() {
        document.getElementById('selectOptionsContainer').style.display = this.value === 'select' ? 'block' : 'none';
    });

    function addColumn() {
        var key = document.getElementById('newColumnKey').value.trim();
        var label = document.getElementById('newColumnLabel').value.trim() || key;
        var type = document.getElementById('newColumnType').value;
        var optionsStr = document.getElementById('newColumnOptions').value.trim();

        if (!key) { showToast('Введите название столбца', 'error'); return; }
        if (columns.some(function(c) { return c.key === key; })) {
            showToast('Столбец с таким ключом уже существует', 'error');
            return;
        }

        var newCol = { key: key, label: label, type: type };
        if (type === 'select' && optionsStr) {
            newCol.options = optionsStr.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
        }

        columns.push(newCol);
        visibleColumns[key] = true;

        data.forEach(function(row) {
            if (type === 'checkbox') row[key] = false;
            else if (type === 'number') row[key] = 0;
            else if (type === 'select' && newCol.options && newCol.options.length) row[key] = newCol.options[0];
            else if (type === 'date') row[key] = new Date().toISOString().slice(0, 10);
            else row[key] = '';
        });

        saveToLocalStorage();
        render();
        closeModal();
        showToast('✅ Столбец "' + label + '" добавлен', 'success');
        if (isOnline) scheduleSave();
    }

    function removeColumn(key) {
        if (!confirm('Удалить столбец "' + key + '"? Все данные в нём будут потеряны.')) return;
        columns = columns.filter(function(c) { return c.key !== key; });
        delete visibleColumns[key];
        data.forEach(function(row) { delete row[key]; });
        saveToLocalStorage();
        render();
        showToast('🗑️ Столбец удалён', 'success');
        if (isOnline) scheduleSave();
    }

    // ================================================================
    // ДЕЙСТВИЯ
    // ================================================================
    function updateField(id, field, value) {
        var row = data.find(function(r) { return r.id === id; });
        if (row) {
            row[field] = value;
            render();
            scheduleSave();
        }
    }

    function deleteRow(id) {
        if (!confirm('Удалить запись?')) return;
        data = data.filter(function(r) { return r.id !== id; });
        selectedIds = selectedIds.filter(function(i) { return i !== id; });
        render();
        scheduleSave();
    }

    function copyRow(id) {
        var row = data.find(function(r) { return r.id === id; });
        if (!row) return;
        var newRow = { id: nextId++ };
        columns.forEach(function(col) {
            if (col.type === 'checkbox') newRow[col.key] = false;
            else if (col.type === 'number') newRow[col.key] = row[col.key] || 0;
            else if (col.type === 'select' && col.options && col.options.length) {
                newRow[col.key] = row[col.key] || col.options[0];
            } else if (col.key === 'date') {
                newRow[col.key] = row[col.key] || new Date().toISOString().slice(0, 10);
            } else {
                newRow[col.key] = row[col.key] || '';
            }
        });
        data.push(newRow);
        render();
        scheduleSave();
        showToast('📋 Запись скопирована', 'success');
    }

    function addRow() {
        var newRow = { id: nextId++ };
        columns.forEach(function(col) {
            if (col.type === 'checkbox') newRow[col.key] = false;
            else if (col.type === 'number') newRow[col.key] = 0;
            else if (col.type === 'select' && col.options && col.options.length) newRow[col.key] = col.options[0];
            else if (col.key === 'date') newRow[col.key] = new Date().toISOString().slice(0, 10);
            else newRow[col.key] = '';
        });
        if (!newRow.client) newRow.client = 'Новый клиент';
        if (!newRow.proposal) newRow.proposal = 'Новое КП';
        if (!newRow.status) newRow.status = 'Черновик';

        data.push(newRow);
        render();
        scheduleSave();
        var tbody = document.getElementById('tableBody');
        var last = tbody.lastElementChild;
        if (last) last.scrollIntoView({ behavior: 'smooth' });
    }

    function resetData() {
        if (data.length && !confirm('Сбросить всё к примеру?')) return;

        columns = [
            { key: 'client', label: 'Клиент', type: 'text' },
            { key: 'proposal', label: 'КП', type: 'text' },
            { key: 'amount', label: 'Сумма', type: 'number' },
            { key: 'date', label: 'Дата КП', type: 'date' },
            { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
            { key: 'agreed', label: 'Согласен', type: 'checkbox' },
            { key: 'comment', label: 'Комментарий', type: 'text' },
            { key: 'phone', label: 'Телефон', type: 'text' },
            { key: 'email', label: 'Email', type: 'text' }
        ];
        columns.forEach(function(col) { visibleColumns[col.key] = true; });

        var defaultData = [
            { client: 'ИП Иванов', proposal: 'Ремонт оборудования', amount: 450000, date: '2026-01-10', status: 'В работе', agreed: true, comment: 'Доп. согласование', phone: '+7 912 345-67-89', email: 'ivanov@mail.ru' },
            { client: 'ООО ЛогистикПро', proposal: 'Транспортные услуги', amount: 670000, date: '2026-01-12', status: 'Отказ', agreed: false, comment: 'Нашли дешевле', phone: '+7 912 345-67-90', email: 'logist@pro.ru' }
        ];

        data = defaultData.map(function(r, i) {
            var copy = {};
            for (var key in r) copy[key] = r[key];
            copy.id = i + 1;
            return copy;
        });
        nextId = data.length + 1;
        selectedIds = [];
        sortColumn = null;
        saveToLocalStorage();
        render();
        if (isOnline) scheduleSave();
        showToast('🔄 Данные сброшены', 'success');
    }

    // ================================================================
    // CSV
    // ================================================================
    function exportCSV() {
        if (!data.length) return showToast('Нет данных для экспорта', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var headers = visible.map(function(c) { return c.label; });
        var rows = data.map(function(r) {
            return visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return '"' + String(val).replace(/"/g, '""') + '"';
            });
        });
        var csv = [headers.join(',')];
        rows.forEach(function(row) { csv.push(row.join(',')); });
        csv = csv.join('\n');
        var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'клиенты_' + new Date().toISOString().slice(0, 10) + '.csv';
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📤 CSV скачан', 'success');
    }

    function handleImport(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var text = ev.target.result;
            var lines = text.split('\n').filter(function(l) { return l.trim(); });

            if (lines.length < 2) { showToast('Файл пуст или неверный формат', 'error'); return; }

            var headerLine = lines[0];
            var headers = headerLine.split(',').map(function(h) { return h.trim().replace(/^"|"$/g, ''); });

            var colMap = {};
            headers.forEach(function(h, index) {
                columns.forEach(function(col) {
                    if (col.label === h || col.key === h) colMap[index] = col.key;
                });
            });

            var imported = [];
            for (var i = 1; i < lines.length; i++) {
                var cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
                var row = { id: nextId++ };
                columns.forEach(function(col) {
                    if (col.type === 'checkbox') row[col.key] = false;
                    else if (col.type === 'number') row[col.key] = 0;
                    else if (col.type === 'select' && col.options && col.options.length) row[col.key] = col.options[0];
                    else if (col.key === 'date') row[col.key] = new Date().toISOString().slice(0, 10);
                    else row[col.key] = '';
                });

                for (var j = 0; j < cols.length; j++) {
                    var key = colMap[j];
                    if (key) {
                        var col = columns.find(function(c) { return c.key === key; });
                        if (col) {
                            if (col.type === 'checkbox') {
                                row[key] = cols[j] === 'Да' || cols[j] === 'TRUE' || cols[j] === 'true' || cols[j] === '1';
                            } else if (col.type === 'number') {
                                row[key] = parseFloat(cols[j]) || 0;
                            } else {
                                row[key] = cols[j] || '';
                            }
                        }
                    }
                }

                var hasData = false;
                columns.forEach(function(col) {
                    var val = row[col.key];
                    if (val && val !== '' && val !== 0 && val !== false) hasData = true;
                });
                if (hasData) imported.push(row);
            }

            if (imported.length) {
                data = imported;
                saveToLocalStorage();
                render();
                if (isOnline) scheduleSave();
                showToast('✅ Импортировано ' + imported.length + ' записей', 'success');
            } else {
                showToast('Не удалось импортировать данные', 'error');
            }
        };
        reader.readAsText(file, 'UTF-8');
        event.target.value = '';
    }

    function exportToClipboard() {
        if (!data.length) return showToast('Нет данных', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var tsv = visible.map(function(c) { return c.label; }).join('\t') + '\n';
        data.forEach(function(r) {
            var row = visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return String(val);
            });
            tsv += row.join('\t') + '\n';
        });
        navigator.clipboard.writeText(tsv).then(function() {
            showToast('📋 Скопировано', 'success');
        }).catch(function() {
            showToast('Не удалось скопировать', 'error');
        });
    }

    // ================================================================
    // TOAST
    // ================================================================
    var toastTimeout;

    function showToast(msg, type) {
        type = type || '';
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast';
        if (type) el.classList.add(type);
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(function() { el.classList.remove('show'); }, 3000);
    }

    // ================================================================
    // ФИЛЬТРЫ
    // ================================================================
    document.getElementById('filterInput').addEventListener('input', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.getElementById('filterAmountMin').addEventListener('input', render);
    document.getElementById('filterAmountMax').addEventListener('input', render);
    document.getElementById('filterDateFrom').addEventListener('change', render);
    document.getElementById('filterDateTo').addEventListener('change', render);

    document.querySelectorAll('.modal').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    });

    // ================================================================
    // ЗАПУСК
    // ================================================================
    loadFromCloud();

    console.log('⚡ CRM загружена');
    console.log('🔑 BIN_ID:', BIN_ID);
    console.log('📊 Колонок:', columns.length);
</script>
