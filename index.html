<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM — Клиентская база</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0d10;
            --bg-secondary: #12161b;
            --bg-card: #181e26;
            --bg-hover: #1f2630;
            --bg-input: #0f1318;
            --border-color: #282f3a;
            --border-light: #1e2430;
            --text-primary: #f0f4f8;
            --text-secondary: #94a3b8;
            --text-muted: #4b5563;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            --header-bg: rgba(18, 22, 27, 0.92);
        }

        [data-theme="light"] {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f8fafc;
            --bg-input: #f1f5f9;
            --border-color: #e2e8f0;
            --border-light: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --header-bg: rgba(255, 255, 255, 0.92);
        }

        @keyframes fadeIn {
            from { opacity: 0;
                transform: translateY(8px); }
            to { opacity: 1;
                transform: translateY(0); }
        }
        @keyframes pulse {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px;
            min-height: 100vh;
            transition: var(--transition);
            line-height: 1.4;
            overflow-x: auto;
        }

        .container {
            max-width: 1480px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
            min-width: 1000px;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
            background: var(--header-bg);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo { font-size: 22px;
            filter: drop-shadow(0 0 12px var(--accent-glow));
            transition: var(--transition); }
        .logo:hover { transform: scale(1.1) rotate(-4deg); }
        .header h1 { font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; }
        .badge { background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--accent-glow); }
        .header-right { display: flex;
            align-items: center;
            gap: 6px; }
        .status-indicator { display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 3px 12px;
            border-radius: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color); }
        .dot { width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block; }
        .dot.online { background: var(--success);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.3); }
        .dot.offline { background: var(--danger);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3); }
        .dot.loading { background: var(--warning);
            animation: pulse 1s infinite; }
        .theme-btn { background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center; }
        .theme-btn:hover { background: var(--bg-hover);
            border-color: var(--text-secondary); }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            align-items: center;
            box-shadow: var(--shadow);
        }
        .toolbar .search-wrap { flex: 1;
            min-width: 150px;
            position: relative; }
        .toolbar .search-wrap input { width: 100%;
            padding: 6px 10px 6px 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            transition: var(--transition);
            font-family: inherit; }
        .toolbar .search-wrap input:focus { border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow); }
        .toolbar .search-wrap .search-icon { position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.4; }

        .toolbar .quick-filters { display: flex;
            gap: 3px;
            flex-wrap: wrap; }
        .toolbar .quick-filters .btn { font-size: 10px;
            padding: 3px 8px; }

        .toolbar .goto-id { display: flex;
            gap: 3px;
            align-items: center; }
        .toolbar .goto-id input { width: 50px;
            padding: 4px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            font-family: inherit; }
        .toolbar .goto-id input:focus { border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            white-space: nowrap;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: 0 0 20px var(--accent-glow); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success);
            color: #fff;
            border: none; }
        .btn-success:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--danger);
            color: #fff;
            border: none; }
        .btn-danger:hover { filter: brightness(1.1); }
        .btn-warning { background: var(--warning);
            color: #0f172a;
            border: none; }
        .btn-warning:hover { filter: brightness(1.1); }
        .btn-outline { background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary); }
        .btn-outline:hover { background: var(--bg-hover);
            border-color: var(--text-secondary); }
        .btn-sm { padding: 3px 8px;
            font-size: 11px; }
        .btn-xs { padding: 2px 6px;
            font-size: 10px; }

        .save-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--text-secondary);
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            margin-left: auto;
        }
        .save-status .spinner { width: 10px;
            height: 10px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none; }

        .table-wrap {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: auto;
            box-shadow: var(--shadow);
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 1000px;
        }

        th {
            background: var(--bg-input);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 2;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
            white-space: nowrap;
        }
        th:hover { background: var(--bg-hover); }

        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 3;
            background: var(--bg-secondary);
            min-width: 28px;
            width: 28px;
        }
        td:first-child { text-align: center; }
        th:first-child { z-index: 4;
            background: var(--bg-input); }

        th:nth-child(2),
        td:nth-child(2) {
            position: sticky;
            left: 28px;
            z-index: 3;
            background: var(--bg-secondary);
            min-width: 120px;
        }
        th:nth-child(2) { z-index: 4;
            background: var(--bg-input); }

        tr:hover td:first-child,
        tr:hover td:nth-child(2) {
            background: var(--bg-hover);
        }

        .sort-icon { margin-left: 3px;
            opacity: 0.3;
            font-size: 8px; }
        th.sort-asc .sort-icon { opacity: 1; }
        th.sort-asc .sort-icon::after { content: '▲'; }
        th.sort-desc .sort-icon { opacity: 1; }
        th.sort-desc .sort-icon::after { content: '▼'; }

        td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            transition: var(--transition);
            white-space: nowrap;
        }
        tr:hover td { background: var(--bg-hover); }
        tr.selected td { background: var(--accent-glow); }
        tr.pinned td { background: rgba(255, 215, 0, 0.05); }
        tr.pinned td:first-child { border-left: 3px solid gold; }
        tr.archived { opacity: 0.4;
            background: var(--bg-hover); }
        tr.archived td { text-decoration: line-through; }

        .status-cell {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-согласовано .status-cell { background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.25); }
        .status-отказ .status-cell { background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25); }
        .status-вработе .status-cell { background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.25); }
        .status-отправлено .status-cell { background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.25); }
        .status-черновик .status-cell { background: rgba(148, 163, 184, 0.15);
            color: var(--text-secondary);
            border: 1px solid rgba(148, 163, 184, 0.25); }

        tr.status-согласовано td:first-child { border-left: 3px solid var(--success); }
        tr.status-отказ td:first-child { border-left: 3px solid var(--danger); }
        tr.status-вработе td:first-child { border-left: 3px solid var(--warning); }
        tr.status-отправлено td:first-child { border-left: 3px solid var(--accent); }
        tr.status-черновик td:first-child { border-left: 3px solid var(--text-muted); }

        .table-input {
            width: 100%;
            padding: 2px 4px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            transition: var(--transition);
            min-width: 50px;
        }
        .table-input:hover { border-color: var(--border-color);
            background: var(--bg-input); }
        .table-input:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .table-select-status {
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            min-width: 100px;
            appearance: auto;
        }
        .table-select-status:hover { border-color: var(--text-secondary);
            background: var(--bg-hover); }
        .table-select-status:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .table-select-status option { background: var(--bg-secondary);
            color: var(--text-primary); }

        input[type="checkbox"] { width: 14px;
            height: 14px;
            accent-color: var(--accent);
            cursor: pointer; }
        .td-checkbox { text-align: center; }

        .action-btns { display: flex;
            gap: 1px;
            flex-wrap: wrap; }
        .action-btns .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            transition: var(--transition);
        }
        .action-btns .btn-icon:hover { background: var(--bg-hover);
            color: var(--text-primary); }
        .action-btns .btn-icon.danger:hover { background: rgba(239, 68, 68, 0.12);
            color: var(--danger); }
        .action-btns .btn-icon.success:hover { background: rgba(34, 197, 94, 0.12);
            color: var(--success); }
        .action-btns .btn-icon.pin { font-size: 11px; }
        .action-btns .btn-icon.pin.active { color: gold; }

        .footer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 12px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .footer .stats { display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-secondary); }
        .footer .stats strong { color: var(--text-primary); }
        .footer .stats .value { color: var(--accent);
            font-weight: 600; }
        .footer .mass-actions { display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            margin-left: auto; }
        .footer .mass-actions select { padding: 2px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 11px;
            outline: none; }
        .footer .mass-actions select:focus { border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow); }
        .footer .right-actions { display: flex;
            gap: 4px;
            flex-wrap: wrap; }

        .qr-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }
        .qr-container.active { display: flex; }
        .qr-box {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }
        .qr-box .close-btn { margin-top: 12px;
            padding: 6px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer; }
        .qr-box #qrcode { display: flex;
            justify-content: center;
            margin: 12px 0; }
        .qr-box #qrcode canvas { background: #fff;
            padding: 6px;
            border-radius: 6px;
            max-width: 100%; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            font-size: 12px;
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90%;
        }
        .toast.show { opacity: 1;
            transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast.warning { border-color: var(--warning); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 { font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px; }
        .modal-content .sub { color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 12px; }
        .modal-content label { display: block;
            margin: 8px 0 4px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500; }
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .modal-content input:focus,
        .modal-content select:focus,
        .modal-content textarea:focus { border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow); }
        .modal-content textarea { min-height: 60px;
            resize: vertical; }
        .modal-actions { display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end; }
        .column-settings { display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px 0; }
        .column-settings label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            cursor: pointer;
            padding: 3px 10px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            margin: 0;
            font-weight: 400;
        }
        .column-settings label:hover { background: var(--bg-hover); }
        .column-settings label input[type="checkbox"] { width: 12px;
            height: 12px; }
        .empty-state { text-align: center;
            padding: 40px 20px;
            color: var(--text-muted); }
        .empty-state .emoji { font-size: 40px;
            display: block;
            margin-bottom: 8px; }

        .table-wrap::-webkit-scrollbar { width: 4px;
            height: 4px; }
        .table-wrap::-webkit-scrollbar-track { background: var(--bg-input); }
        .table-wrap::-webkit-scrollbar-thumb { background: var(--border-color);
            border-radius: 10px; }
        .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 768px) {
            body { padding: 6px; }
            .container { min-width: auto; }
            .header { flex-direction: column;
                align-items: stretch;
                padding: 8px 10px; }
            .header h1 { font-size: 16px; }
            .header-right { justify-content: space-between; }
            .toolbar { flex-direction: column;
                align-items: stretch;
                padding: 6px 8px; }
            .toolbar .search-wrap { min-width: auto; }
            .toolbar .goto-id { width: 100%; }
            .toolbar .goto-id input { flex: 1; }
            .save-status { margin-left: 0; }
            .footer { flex-direction: column;
                align-items: stretch;
                padding: 6px 8px; }
            .footer .mass-actions { margin-left: 0; }
            .footer .right-actions { justify-content: center; }
            .table-wrap { overflow: auto;
                -webkit-overflow-scrolling: touch; }
            table { min-width: 900px;
                font-size: 11px; }
            th,
            td { padding: 4px 6px;
                white-space: nowrap; }
            .btn { font-size: 10px;
                padding: 3px 6px; }
            .status-cell { font-size: 10px;
                padding: 2px 8px; }
            .table-select-status { min-width: 80px;
                font-size: 10px;
                padding: 2px 4px; }
            .table-input { font-size: 11px;
                padding: 2px 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="header-left">
                <span class="logo">⚡</span>
                <h1>CRM</h1>
                <span class="badge" id="countBadge">0</span>
            </div>
            <div class="header-right">
                <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌓</button>
                <div class="status-indicator">
                    <span class="dot loading" id="statusDot"></span>
                    <span id="statusText">Подключение</span>
                </div>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="filterInput" placeholder="Поиск..." list="searchSuggestions" />
                <datalist id="searchSuggestions"></datalist>
            </div>

            <div class="quick-filters">
                <button class="btn btn-xs btn-outline" onclick="setFilter('all')">Все</button>
                <button class="btn btn-xs btn-outline" onclick="setFilter('Согласовано')">✅</button>
                <button class="btn btn-xs btn-outline" onclick="setFilter('Отказ')">❌</button>
                <button class="btn btn-xs btn-outline" onclick="setFilter('В работе')">⚡</button>
                <button class="btn btn-xs btn-outline" onclick="setFilter('Отправлено')">📤</button>
                <button class="btn btn-xs btn-outline" onclick="setFilter('Черновик')">📝</button>
            </div>

            <div class="goto-id">
                <input type="number" id="gotoIdInput" placeholder="ID" min="1" />
                <button class="btn btn-sm btn-primary" onclick="goToId()">🔍</button>
            </div>

            <select id="filterStatus" style="display:none;">
                <option value="">Все статусы</option>
                <option value="Согласовано">Согласовано</option>
                <option value="Отказ">Отказ</option>
                <option value="В работе">В работе</option>
                <option value="Отправлено">Отправлено</option>
                <option value="Черновик">Черновик</option>
            </select>

            <div style="display:flex;gap:4px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="addRow()">➕</button>
                <button class="btn btn-success" onclick="exportCSV()">📤</button>
                <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📥</button>
                <button class="btn btn-outline" onclick="exportPDF()">📄</button>
                <button class="btn btn-outline" onclick="showColumnSettings()">⚙️</button>
                <button class="btn btn-outline" onclick="showArchiveToggle()">🗂️</button>
                <button class="btn btn-outline btn-sm" onclick="resetData()">🔄</button>
            </div>

            <div class="save-status">
                <span class="spinner" id="savingSpinner"></span>
                <span id="savingText">💾 Сохранено</span>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead id="tableHead">
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10"><div class="loading">⏳ Загрузка данных...</div></td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <div class="stats">
                <span>Всего: <strong id="rowCounter">0</strong></span>
                <span>Согласны: <strong id="agreedCounter">0</strong></span>
                <span>Сумма: <strong class="value" id="totalAmount">0</strong></span>
                <span>Архив: <strong id="archiveCounter">0</strong></span>
            </div>

            <div class="mass-actions" id="massActions" style="display:none;">
                <span>Выбрано: <strong id="selectedCount">0</strong></span>
                <select id="massStatusSelect">
                    <option value="">Статус</option>
                    <option value="Согласовано">Согласовано</option>
                    <option value="Отказ">Отказ</option>
                    <option value="В работе">В работе</option>
                    <option value="Отправлено">Отправлено</option>
                    <option value="Черновик">Черновик</option>
                </select>
                <button class="btn btn-warning btn-sm" onclick="massStatus()">Применить</button>
                <button class="btn btn-danger btn-sm" onclick="massDelete()">🗑</button>
                <button class="btn btn-sm btn-outline" onclick="massArchive()">📦</button>
            </div>

            <div class="right-actions">
                <button class="btn btn-outline btn-sm" onclick="exportToClipboard()">📋</button>
                <button class="btn btn-outline btn-sm" onclick="showQuickAdd()">⚡</button>
            </div>
        </div>
    </div>

    <div class="qr-container" id="qrContainer">
        <div class="qr-box">
            <h3>📱 QR-код</h3>
            <p style="color:var(--text-secondary);font-size:12px;margin-bottom:6px;" id="qrClientName">Клиент</p>
            <div id="qrcode"></div>
            <button class="close-btn" onclick="closeQR()">Закрыть</button>
        </div>
    </div>

    <div class="modal" id="quickAddModal">
        <div class="modal-content">
            <h3>⚡ Быстрая вставка</h3>
            <p class="sub">Вставьте данные из Excel (разделитель: запятая)</p>
            <textarea id="quickAddText" placeholder="Клиент, Телефон, Сумма, Статус&#10;ИП Иванов, +7 912 345-67-89, 150000, В работе"></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="quickAdd()">Добавить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="columnSettingsModal">
        <div class="modal-content">
            <h3>⚙️ Столбцы</h3>
            <div class="column-settings" id="columnSettingsList"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <input type="file" id="fileInput" accept=".csv,.json" style="display:none" onchange="handleImport(event)" />

    <script>
        var BIN_ID = '6a34730dda38895dfeda3121';
        var API_KEY = '$2a$10$euK6kkgJrxsrsI06lUXdu.Zyp1byoA3eVeev6S/Kiol96uQejCvKa';

        var data = [];
        var nextId = 1;
        var isSaving = false;
        var saveTimeout = null;
        var isOnline = false;
        var sortColumn = null;
        var sortDirection = 1;
        var selectedIds = [];
        var visibleColumns = {};
        var showArchived = false;

        // 🔥 НОВЫЕ СТОЛБЦЫ:
        // comment → ОЦЕНКИ (rating)
        // email → КОММЕНТАРИЙ (comment)
        // УБРАН next_contact
    var columns = [
    { key: 'client', label: 'Клиент', type: 'text' },
    { key: 'phone', label: 'Телефон', type: 'text' },
    { key: 'amount', label: 'Сумма', type: 'number' },
    { key: 'date', label: 'Дата КП', type: 'date' },
    { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
    { key: 'agreed', label: 'Согласен', type: 'checkbox' },
    { key: 'rating', label: '⭐ Оценка', type: 'text' },
    { key: 'comment', label: '📝 Комментарий', type: 'text' },
    { key: 'category', label: 'Категория', type: 'text' },
    { key: 'pinned', label: '📌', type: 'checkbox' }
];

        // НОВЫЙ ПОРЯДОК ВИДИМОСТИ
        columns.forEach(function(col) { visibleColumns[col.key] = true; });

        var originalFetch = window.fetch;
        window.fetch = function(url, options) {
            if (typeof url === 'string' && url.includes('api.jsonbin.io')) {
                options = options || {};
                options.headers = options.headers || {};
                options.headers['Connection'] = 'close';
                var separator = url.includes('?') ? '&' : '?';
                url = url + separator + '_=' + Date.now();
                return originalFetch(url, options);
            }
            return originalFetch(url, options);
        };

        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('crm_theme', next);
        }

        function loadTheme() {
            var theme = localStorage.getItem('crm_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        }
        loadTheme();

        async function loadFromCloud() {
            try {
                setStatus('loading', 'Загрузка...');
                var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest?cors=true', {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (!resp.ok) throw new Error('Ошибка ' + resp.status);
                var result = await resp.json();
                var loaded = result.record;
                if (loaded && Array.isArray(loaded) && loaded.length > 0) {
                    data = loaded;
                    data.forEach(function(row) {
                        if (row.email !== undefined) {
                            // email → comment (новое поле)
                            if (!row.comment) row.comment = row.email;
                            delete row.email;
                        }
                        if (row.rating === undefined) row.rating = '';
                        if (row.comment === undefined) row.comment = '';
                        if (row.phone === undefined) row.phone = '';
                        if (row.category === undefined) row.category = '';
                        if (row.priority === undefined) row.priority = 'Средний';
                        if (row.pinned === undefined) row.pinned = false;
                        if (row.archived === undefined) row.archived = false;
                        if (row.updated_at === undefined) row.updated_at = new Date().toISOString();
                        // Убираем next_contact если есть
                        if (row.next_contact !== undefined) delete row.next_contact;
                    });
                    nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                    isOnline = true;
                    setStatus('online', 'Онлайн');
                    render();
                    saveToLocalStorage();
                    showToast('✅ Загружено ' + data.length + ' записей', 'success');
                    return;
                }
                loadFromLocalStorage();
            } catch (e) {
                console.warn('Облако недоступно:', e);
                isOnline = false;
                setStatus('offline', 'Офлайн');
                loadFromLocalStorage();
            }
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem('crm_data', JSON.stringify(data));
                localStorage.setItem('crm_nextId', String(nextId));
                localStorage.setItem('crm_columns', JSON.stringify(columns));
                localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
                document.getElementById('savingText').textContent = '💾 Сохранено';
                document.getElementById('savingSpinner').style.display = 'none';
            } catch (e) {
                console.error('Ошибка сохранения в localStorage:', e);
            }
        }

        function loadFromLocalStorage() {
            try {
                var stored = localStorage.getItem('crm_data');
                var storedId = localStorage.getItem('crm_nextId');
                var storedCols = localStorage.getItem('crm_columns');
                var storedVisible = localStorage.getItem('crm_visible_columns');
                if (storedVisible) {
                    var parsedVisible = JSON.parse(storedVisible);
                    if (parsedVisible) visibleColumns = parsedVisible;
                }
                if (storedCols) {
                    var parsedCols = JSON.parse(storedCols);
                    if (Array.isArray(parsedCols) && parsedCols.length > 0) {
                        columns = parsedCols;
                    }
                }
                if (stored) {
                    data = JSON.parse(stored);
                    data.forEach(function(row) {
                        if (row.email !== undefined) {
                            if (!row.comment) row.comment = row.email;
                            delete row.email;
                        }
                        if (row.rating === undefined) row.rating = '';
                        if (row.comment === undefined) row.comment = '';
                        if (row.phone === undefined) row.phone = '';
                        if (row.category === undefined) row.category = '';
                        if (row.priority === undefined) row.priority = 'Средний';
                        if (row.pinned === undefined) row.pinned = false;
                        if (row.archived === undefined) row.archived = false;
                        if (row.updated_at === undefined) row.updated_at = new Date().toISOString();
                        if (row.next_contact !== undefined) delete row.next_contact;
                    });
                    if (storedId) {
                        nextId = parseInt(storedId, 10);
                    } else {
                        nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                    }
                    render();
                    showToast('📁 Загружено из кеша', 'success');
                    return;
                }
                resetData();
            } catch (e) {
                console.error('Ошибка загрузки из localStorage:', e);
                resetData();
            }
        }

        async function saveToCloud() {
            if (isSaving) return;
            isSaving = true;
            showSaving(true, 'Сохранение...');
            try {
                var cleanData = data.map(function(row) {
                    var clean = {};
                    for (var key in row) {
                        if (row[key] === undefined || row[key] === null) clean[key] = '';
                        else if (typeof row[key] === 'string') {
                            clean[key] = row[key].replace(/[\x00-\x1F\x7F-\x9F]/g, '');
                        } else clean[key] = row[key];
                    }
                    return clean;
                });
                var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '?cors=true', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(cleanData)
                });
                if (!resp.ok) throw new Error('Ошибка ' + resp.status);
                isSaving = false;
                isOnline = true;
                setStatus('online', 'Онлайн');
                showSaving(false, '💾 Сохранено');
                saveToLocalStorage();
                showToast('💾 Сохранено в облаке', 'success');
            } catch (e) {
                console.error('Ошибка сохранения:', e);
                isSaving = false;
                isOnline = false;
                setStatus('offline', 'Офлайн');
                showSaving(false, '📁 Локально');
                saveToLocalStorage();
                showToast('⚠️ Ошибка: сохранено локально', 'error');
            }
        }

        function scheduleSave() {
            clearTimeout(saveTimeout);
            showSaving(true, 'Сохранение...');
            saveTimeout = setTimeout(function() {
                if (isOnline) saveToCloud();
                else { saveToLocalStorage();
                    showSaving(false, '📁 Локально'); }
            }, 800);
        }

        function setStatus(type, text) {
            var dot = document.getElementById('statusDot');
            var el = document.getElementById('statusText');
            dot.className = 'dot';
            if (type === 'online') dot.classList.add('online');
            else if (type === 'offline') dot.classList.add('offline');
            else dot.classList.add('loading');
            el.textContent = text;
        }

        function showSaving(active, text) {
            document.getElementById('savingSpinner').style.display = active ? 'inline-block' : 'none';
            if (text) document.getElementById('savingText').textContent = text;
        }

        function render() {
            var thead = document.getElementById('headerRow');
            var tbody = document.getElementById('tableBody');

            var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
            var filterStatus = document.getElementById('filterStatus').value;

            var headerHtml = '<th style="width:28px;"><input type="checkbox" onchange="toggleAllSelect(this.checked)" /></th>';
            headerHtml += '<th style="min-width:120px;">Клиент</th>';
            columns.forEach(function(col) {
                if (visibleColumns[col.key] === false) return;
                if (col.key === 'client') return;
                var sortClass = '';
                if (sortColumn === col.key) {
                    sortClass = sortDirection === 1 ? 'sort-asc' : 'sort-desc';
                }
                headerHtml += '<th class="' + sortClass + '" onclick="sortTable(\'' + col.key + '\')">' + col.label;
                headerHtml += '<span class="sort-icon"></span>';
                if (col.key !== 'pinned' && col.key !== 'agreed') {
                    headerHtml += '<span class="col-actions"><button onclick="event.stopPropagation();removeColumn(\'' +
                        col.key + '\')" title="Удалить">✕</button></span>';
                }
                headerHtml += '</th>';
            });
            headerHtml += '<th style="width:90px;">Действия</th>';
            thead.innerHTML = headerHtml;

            var filtered = data.filter(function(row) {
                if (row.archived && !showArchived) return false;
                var matchText = false;
                columns.forEach(function(col) {
                    var val = row[col.key] || '';
                    if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
                });
                var statusMatch = filterStatus === '' || row.status === filterStatus;
                return matchText && statusMatch;
            });

            if (sortColumn) {
                filtered.sort(function(a, b) {
                    var valA = a[sortColumn] !== undefined ? a[sortColumn] : '';
                    var valB = b[sortColumn] !== undefined ? b[sortColumn] : '';
                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();
                    if (valA < valB) return -sortDirection;
                    if (valA > valB) return sortDirection;
                    return 0;
                });
            }

            filtered.sort(function(a, b) {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return 0;
            });

            if (!filtered.length) {
                var colCount = columns.filter(function(c) { return visibleColumns[c.key] !== false; }).length + 3;
                tbody.innerHTML = '<tr><td colspan="' + colCount +
                    '"><div class="empty-state"><span class="emoji">📭</span><h3>Нет записей</h3></div></td></tr>';
                document.getElementById('countBadge').textContent = data.length;
                updateCounters();
                updateMassActions();
                updateSuggestions();
                return;
            }

            var html = '';
            filtered.forEach(function(row, idx) {
                var statusClass = (row.status || 'Черновик').toLowerCase().replace(/ /g, '');
                var isSelected = selectedIds.indexOf(row.id) !== -1;
                var isPinned = row.pinned || false;
                var isArchived = row.archived || false;

                html += '<tr class="status-' + statusClass + (isSelected ? ' selected' : '') + (isPinned ? ' pinned' : '') +
                    (isArchived ? ' archived' : '') + '">';
                html += '<td class="td-checkbox"><input type="checkbox" ' + (isSelected ? 'checked' : '') +
                    ' onchange="toggleSelect(' + row.id + ', this.checked)" /></td>';
                html += '<td data-label="Клиент"><span style="font-weight:500;">' + escapeHtml(row.client ||
                    'Без имени') + '</span></td>';

                columns.forEach(function(col) {
                    if (visibleColumns[col.key] === false) return;
                    if (col.key === 'client') return;
                    html += '<td data-label="' + col.label + '">';
                    html += renderCell(row, col);
                    html += '</td>';
                });

                html += '<td data-label="Действия"><div class="action-btns">';
                html += '<button class="btn-icon pin ' + (isPinned ? 'active' : '') + '" onclick="togglePin(' + row
                    .id + ')" title="Закрепить">📌</button>';
                html += '<button class="btn-icon" onclick="showQR(\'' + row.id + '\')" title="QR-код">📱</button>';
                html += '<button class="btn-icon success" onclick="copyRow(' + row.id +
                    ')" title="Копировать">📋</button>';
                html += '<button class="btn-icon" onclick="toggleArchive(' + row.id + ')" title="Архив">📦</button>';
                html += '<button class="btn-icon danger" onclick="deleteRow(' + row.id + ')" title="Удалить">🗑</button>';
                html += '</div></td>';
                html += '</tr>';
            });

            tbody.innerHTML = html;
            document.getElementById('countBadge').textContent = data.length;
            updateCounters();
            updateMassActions();
            updateSuggestions();
        }

        function renderCell(row, col) {
            var value = row[col.key] !== undefined ? row[col.key] : '';
            var id = row.id;
            var key = col.key;

            switch (col.type) {
                case 'checkbox':
                    if (key === 'pinned') {
                        var checked = value ? 'checked' : '';
                        return '<input type="checkbox" ' + checked + ' onchange="togglePin(' + id + ')" />';
                    }
                    var checked = value ? 'checked' : '';
                    return '<input type="checkbox" ' + checked + ' onchange="updateField(' + id + ', \'' + key +
                        '\', this.checked)" />';

                case 'select':
                    if (key === 'status') {
                        var options = col.options || ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'];
                        var selectHtml =
                            '<select class="table-select-status" onchange="updateField(' + id + ', \'' + key +
                            '\', this.value)" style="min-width:100px;">';
                        options.forEach(function(opt) {
                            selectHtml += '<option value="' + opt + '" ' + (opt === value ? 'selected' : '') +
                                '>' + opt + '</option>';
                        });
                        selectHtml += '</select>';
                        return selectHtml;
                    }
                    var options = col.options || ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'];
                    var html = '<select class="table-select" onchange="updateField(' + id + ', \'' + key +
                        '\', this.value)">';
                    options.forEach(function(opt) {
                        html += '<option value="' + opt + '" ' + (opt === value ? 'selected' : '') + '>' + opt +
                            '</option>';
                    });
                    html += '</select>';
                    return html;

                case 'number':
                    return '<input class="table-input" type="number" value="' + (value || 0) +
                        '" onchange="updateField(' + id + ', \'' + key + '\', Number(this.value))" style="min-width:60px;" />';

                case 'date':
                    return '<input class="table-input" type="date" value="' + (value || '') +
                        '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" style="min-width:80px;" />';

                default:
                    if (key === 'phone') {
                        return '<input class="table-input" type="tel" value="' + escapeHtml(String(value)) +
                            '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" placeholder="+7..." style="min-width:110px;" />';
                    }
                    if (key === 'rating') {
                        return '<input class="table-input" type="text" value="' + escapeHtml(String(value)) +
                            '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" placeholder="Оценка..." style="min-width:60px;" />';
                    }
                    return '<input class="table-input" type="text" value="' + escapeHtml(String(value)) +
                        '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" />';
            }
        }

        function updateCounters() {
            var total = data.length;
            var agreed = data.filter(function(r) { return r.agreed === true; }).length;
            var sum = data.reduce(function(s, r) { return s + (r.amount || 0); }, 0);
            var archived = data.filter(function(r) { return r.archived === true; }).length;
            document.getElementById('rowCounter').textContent = total;
            document.getElementById('agreedCounter').textContent = agreed;
            document.getElementById('totalAmount').textContent = sum.toLocaleString('ru-RU');
            document.getElementById('archiveCounter').textContent = archived;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g,
            '&gt;');
        }

        function updateSuggestions() {
            var datalist = document.getElementById('searchSuggestions');
            var clients = data.map(function(r) { return r.client || ''; }).filter(function(c) { return c; });
            var unique = clients.filter(function(v, i, a) { return a.indexOf(v) === i; }).slice(0, 20);
            datalist.innerHTML = unique.map(function(c) { return '<option value="' + escapeHtml(c) + '">'; }).join('');
        }

        function setFilter(status) {
            if (status === 'all') {
                document.getElementById('filterStatus').value = '';
            } else {
                document.getElementById('filterStatus').value = status;
            }
            render();
            showToast('📊 Фильтр: ' + (status === 'all' ? 'Все' : status), 'success');
        }

        function goToId() {
            var input = document.getElementById('gotoIdInput');
            var id = parseInt(input.value);
            if (!id || isNaN(id)) { showToast('Введите ID', 'error'); return; }
            var row = data.find(function(r) { return r.id === id; });
            if (!row) { showToast('Запись с ID ' + id + ' не найдена', 'error'); return; }
            var rows = document.querySelectorAll('#tableBody tr');
            for (var i = 0; i < rows.length; i++) {
                var checkbox = rows[i].querySelector('input[type="checkbox"]');
                if (checkbox) {
                    var rowId = parseInt(checkbox.getAttribute('onchange').match(/\d+/));
                    if (rowId === id) {
                        rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        rows[i].style.background = 'var(--accent-glow)';
                        setTimeout(function() { rows[i].style.background = ''; }, 2000);
                        showToast('🔍 Найдена запись #' + id, 'success');
                        input.value = '';
                        return;
                    }
                }
            }
            showToast('Запись не отображается (возможно, фильтр скрывает её)', 'error');
        }

        function togglePin(id) {
            var row = data.find(function(r) { return r.id === id; });
            if (!row) return;
            row.pinned = !row.pinned;
            render();
            scheduleSave();
            showToast(row.pinned ? '📌 Закреплено' : '📌 Откреплено', 'success');
        }

        var qrInstance = null;

        function showQR(id) {
            var row = data.find(function(r) { return r.id === id; });
            if (!row) return;
            var container = document.getElementById('qrContainer');
            document.getElementById('qrClientName').textContent = row.client || 'Клиент #' + row.id;
            container.classList.add('active');

            var qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            var url = window.location.href.split('?')[0] + '?id=' + row.id;
            qrInstance = new QRCode(qrDiv, {
                text: url,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function closeQR() {
            document.getElementById('qrContainer').classList.remove('active');
            if (qrInstance) {
                qrInstance.clear();
                qrInstance = null;
            }
        }

        function toggleArchive(id) {
            var row = data.find(function(r) { return r.id === id; });
            if (!row) return;
            row.archived = !row.archived;
            render();
            scheduleSave();
            showToast(row.archived ? '📦 В архиве' : '📦 Восстановлено', 'success');
        }

        function showArchiveToggle() {
            showArchived = !showArchived;
            render();
            showToast(showArchived ? '🗂️ Архив показан' : '🗂️ Архив скрыт', 'success');
        }

        function exportPDF() {
            if (!data.length) return showToast('Нет данных для экспорта', 'error');
            var filtered = getFilteredData();
            if (!filtered.length) return showToast('Нет данных для экспорта', 'error');

            var html = '<html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;padding:20px;}h2{color:#2563eb;}table{width:100%;border-collapse:collapse;margin-top:16px;}th{background:#f1f5f9;padding:6px;border:1px solid #e2e8f0;text-align:left;}td{padding:6px;border:1px solid #e2e8f0;}</style></head><body><h2>📊 Отчёт по клиентам</h2>';
            html += '<p>Дата: ' + new Date().toLocaleDateString('ru-RU') + '</p>';
            html += '<p>Всего записей: ' + filtered.length + '</p>';
            html +=
                '<table><thead><tr><th>#</th><th>Клиент</th><th>Телефон</th><th>Сумма</th><th>Статус</th><th>Согласен</th></tr></thead><tbody>';

            filtered.forEach(function(r, i) {
                var statusLabels = {
                    'Согласовано': '✅ Согласовано',
                    'Отказ': '❌ Отказ',
                    'В работе': '⚡ В работе',
                    'Отправлено': '📤 Отправлено',
                    'Черновик': '📝 Черновик'
                };
                html += '<tr><td>' + (i + 1) + '</td><td>' + escapeHtml(r.client || '') + '</td><td>' + escapeHtml(r
                    .phone || '') + '</td><td>' + (r.amount || 0) + '</td><td>' + (statusLabels[r.status] || r
                    .status) + '</td><td>' + (r.agreed ? '✅ Да' : '❌ Нет') + '</td></tr>';
            });

            html += '</tbody></table></body></html>';

            var win = window.open('', '_blank', 'width=1000,height=700');
            win.document.write(html);
            win.document.close();
            setTimeout(function() { win.print(); }, 500);
            showToast('📄 PDF открыт для печати', 'success');
        }

        function showQuickAdd() {
            document.getElementById('quickAddModal').classList.add('active');
            document.getElementById('quickAddText').value = '';
        }

        function quickAdd() {
            var text = document.getElementById('quickAddText').value.trim();
            if (!text) { showToast('Введите данные', 'error'); return; }

            var lines = text.split('\n').filter(function(l) { return l.trim(); });
            var added = 0;

            lines.forEach(function(line) {
                var parts = line.split(',').map(function(p) { return p.trim(); });
                if (parts.length < 3) return;

                var row = { id: nextId++ };
                columns.forEach(function(col) {
                    if (col.type === 'checkbox') row[col.key] = false;
                    else if (col.type === 'number') row[col.key] = 0;
                    else if (col.type === 'select' && col.options && col.options.length) row[col.key] = col
                        .options[0];
                    else if (col.key === 'date') row[col.key] = new Date().toISOString().slice(0, 10);
                    else row[col.key] = '';
                });

                row.client = parts[0] || 'Новый клиент';
                row.phone = parts[1] || '';
                row.amount = parseFloat(parts[2]) || 0;
                row.status = parts[3] || 'Черновик';
                if (parts[4]) row.category = parts[4];
                if (parts[5]) row.rating = parts[5];
                if (parts[6]) row.comment = parts[6];

                data.push(row);
                added++;
            });

            if (added) {
                render();
                scheduleSave();
                showToast('✅ Добавлено ' + added + ' записей', 'success');
            } else {
                showToast('❌ Не удалось добавить записи', 'error');
            }
            closeModal();
        }

        function toggleSelect(id, checked) {
            if (checked) {
                if (selectedIds.indexOf(id) === -1) selectedIds.push(id);
            } else {
                selectedIds = selectedIds.filter(function(i) { return i !== id; });
            }
            render();
        }

        function toggleAllSelect(checked) {
            var filtered = getFilteredData();
            selectedIds = [];
            if (checked) {
                filtered.forEach(function(row) {
                    if (selectedIds.indexOf(row.id) === -1) selectedIds.push(row.id);
                });
            }
            render();
        }

        function getFilteredData() {
            var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
            var filterStatus = document.getElementById('filterStatus').value;
            return data.filter(function(row) {
                if (row.archived && !showArchived) return false;
                var matchText = false;
                columns.forEach(function(col) {
                    var val = row[col.key] || '';
                    if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
                });
                var statusMatch = filterStatus === '' || row.status === filterStatus;
                return matchText && statusMatch;
            });
        }

        function updateMassActions() {
            var el = document.getElementById('massActions');
            var count = selectedIds.length;
            document.getElementById('selectedCount').textContent = count;
            if (count > 0) { el.style.display = 'flex'; } else { el.style.display = 'none'; }
        }

        function massDelete() {
            if (!selectedIds.length) return;
            if (!confirm('Удалить ' + selectedIds.length + ' записей?')) return;
            data = data.filter(function(r) { return selectedIds.indexOf(r.id) === -1; });
            selectedIds = [];
            render();
            scheduleSave();
            showToast('🗑️ Удалено записей', 'success');
        }

        function massStatus() {
            if (!selectedIds.length) return;
            var status = document.getElementById('massStatusSelect').value;
            if (!status) { showToast('Выберите статус', 'error'); return; }
            var count = selectedIds.length;
            data.forEach(function(r) {
                if (selectedIds.indexOf(r.id) !== -1) r.status = status;
            });
            selectedIds = [];
            render();
            scheduleSave();
            showToast('📝 Статус обновлён для ' + count + ' записей', 'success');
        }

        function massArchive() {
            if (!selectedIds.length) return;
            var count = selectedIds.length;
            data.forEach(function(r) {
                if (selectedIds.indexOf(r.id) !== -1) r.archived = !r.archived;
            });
            selectedIds = [];
            render();
            scheduleSave();
            showToast('📦 Архив переключён для ' + count + ' записей', 'success');
        }

        function showColumnSettings() {
            var modal = document.getElementById('columnSettingsModal');
            var list = document.getElementById('columnSettingsList');
            var html = '';
            columns.forEach(function(col) {
                var checked = visibleColumns[col.key] !== false ? 'checked' : '';
                html += '<label><input type="checkbox" ' + checked +
                    ' onchange="toggleColumnVisibility(\'' + col.key + '\', this.checked)" /> ' + col.label +
                    '</label>';
            });
            list.innerHTML = html;
            modal.classList.add('active');
        }

        function toggleColumnVisibility(key, visible) {
            visibleColumns[key] = visible;
            localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
            render();
        }

        function removeColumn(key) {
            if (!confirm('Удалить столбец "' + key + '"? Все данные в нём будут потеряны.')) return;
            columns = columns.filter(function(c) { return c.key !== key; });
            delete visibleColumns[key];
            data.forEach(function(row) { delete row[key]; });
            saveToLocalStorage();
            render();
            showToast('🗑️ Столбец удалён', 'success');
            if (isOnline) scheduleSave();
        }

        function updateField(id, field, value) {
            var row = data.find(function(r) { return r.id === id; });
            if (row) {
                if (field === 'amount') value = parseFloat(value) || 0;
                row[field] = value;
                row.updated_at = new Date().toISOString();
                render();
                scheduleSave();
            }
        }

        function deleteRow(id) {
            if (!confirm('Удалить запись?')) return;
            data = data.filter(function(r) { return r.id !== id; });
            selectedIds = selectedIds.filter(function(i) { return i !== id; });
            render();
            scheduleSave();
            showToast('🗑️ Запись удалена', 'success');
        }

        function copyRow(id) {
            var row = data.find(function(r) { return r.id === id; });
            if (!row) return;
            var newRow = { id: nextId++ };
            columns.forEach(function(col) {
                if (col.type === 'checkbox') newRow[col.key] = false;
                else if (col.type === 'number') newRow[col.key] = row[col.key] || 0;
                else if (col.type === 'select' && col.options && col.options.length) {
                    newRow[col.key] = row[col.key] || col.options[0];
                } else if (col.key === 'date') {
                    newRow[col.key] = row[col.key] || new Date().toISOString().slice(0, 10);
                } else {
                    newRow[col.key] = row[col.key] || '';
                }
            });
            newRow.pinned = false;
            newRow.archived = false;
            newRow.updated_at = new Date().toISOString();
            data.push(newRow);
            render();
            scheduleSave();
            showToast('📋 Запись скопирована', 'success');
        }

        function addRow() {
            var newRow = { id: nextId++ };
            columns.forEach(function(col) {
                if (col.type === 'checkbox') newRow[col.key] = false;
                else if (col.type === 'number') newRow[col.key] = 0;
                else if (col.type === 'select' && col.options && col.options.length) newRow[col.key] = col.options[0];
                else if (col.key === 'date') newRow[col.key] = new Date().toISOString().slice(0, 10);
                else newRow[col.key] = '';
            });
            newRow.client = 'Новый клиент';
            newRow.status = 'Черновик';
            newRow.priority = 'Средний';
            newRow.pinned = false;
            newRow.archived = false;
            newRow.updated_at = new Date().toISOString();

            data.push(newRow);
            render();
            scheduleSave();
            var tbody = document.getElementById('tableBody');
            var last = tbody.lastElementChild;
            if (last) last.scrollIntoView({ behavior: 'smooth' });
            showToast('➕ Добавлена новая запись', 'success');
        }

        function resetData() {
            if (data.length && !confirm('Сбросить всё к примеру?')) return;

            columns = [
                { key: 'client', label: 'Клиент', type: 'text' },
                { key: 'phone', label: 'Телефон', type: 'text' },
                { key: 'amount', label: 'Сумма', type: 'number' },
                { key: 'date', label: 'Дата КП', type: 'date' },
                { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено',
                        'Согласовано', 'Черновик'
                    ] },
                { key: 'agreed', label: 'Согласен', type: 'checkbox' },
                { key: 'rating', label: '⭐ Оценка', type: 'text' },
                { key: 'comment', label: '📝 Комментарий', type: 'text' },
                { key: 'category', label: 'Категория', type: 'text' },
                { key: 'pinned', label: '📌', type: 'checkbox' }
            ];
            columns.forEach(function(col) { visibleColumns[col.key] = true; });

            var defaultData = [
                { client: 'ИП Иванов', phone: '+7 912 345-67-89', amount: 450000, date: '2026-01-10',
                    status: 'В работе', agreed: true, rating: '4.8 ★', comment: 'Доп. согласование',
                    category: 'Юридические', pinned: false, archived: false,
                updated_at: new Date().toISOString() },
                { client: 'ООО ЛогистикПро', phone: '+7 912 345-67-90', amount: 670000, date: '2026-01-12',
                    status: 'Отказ', agreed: false, rating: '3.2 ★', comment: 'Нашли дешевле',
                    category: 'Транспорт', pinned: false, archived: false,
                updated_at: new Date().toISOString() }
            ];

            data = defaultData.map(function(r, i) {
                var copy = {};
                for (var key in r) copy[key] = r[key];
                copy.id = i + 1;
                return copy;
            });
            nextId = data.length + 1;
            selectedIds = [];
            sortColumn = null;
            saveToLocalStorage();
            render();
            if (isOnline) scheduleSave();
            showToast('🔄 Данные сброшены', 'success');
        }

        function exportCSV() {
            if (!data.length) return showToast('Нет данных для экспорта', 'error');
            var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
            var headers = visible.map(function(c) { return c.label; });
            var rows = data.map(function(r) {
                return visible.map(function(c) {
                    var val = r[c.key] !== undefined ? r[c.key] : '';
                    if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                    return '"' + String(val).replace(/"/g, '""') + '"';
                });
            });
            var csv = [headers.join(',')];
            rows.forEach(function(row) { csv.push(row.join(',')); });
            csv = csv.join('\n');
            var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'клиенты_' + new Date().toISOString().slice(0, 10) + '.csv';
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('📤 CSV скачан', 'success');
        }

        function handleImport(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                var text = ev.target.result;
                try {
                    var parsed = JSON.parse(text);
                    if (Array.isArray(parsed) && parsed.length) {
                        parsed.forEach(function(row) {
                            row.id = nextId++;
                            if (row.email !== undefined) {
                                if (!row.comment) row.comment = row.email;
                                delete row.email;
                            }
                            if (row.rating === undefined) row.rating = '';
                            if (row.comment === undefined) row.comment = '';
                            if (row.phone === undefined) row.phone = '';
                            if (row.category === undefined) row.category = '';
                            if (row.priority === undefined) row.priority = 'Средний';
                            if (row.pinned === undefined) row.pinned = false;
                            if (row.archived === undefined) row.archived = false;
                            if (row.updated_at === undefined) row.updated_at = new Date().toISOString();
                            if (row.next_contact !== undefined) delete row.next_contact;
                        });
                        data = parsed;
                        saveToLocalStorage();
                        render();
                        if (isOnline) scheduleSave();
                        showToast('✅ Импортировано ' + data.length + ' записей (JSON)', 'success');
                        return;
                    }
                } catch (e) {
                    var lines = text.split('\n').filter(function(l) { return l.trim(); });
                    if (lines.length < 2) { showToast('Файл пуст или неверный формат', 'error'); return; }

                    var headerLine = lines[0];
                    var headers = headerLine.split(',').map(function(h) { return h.trim().replace(/^"|"$/g, '') });

                    var colMap = {};
                    headers.forEach(function(h, index) {
                        columns.forEach(function(col) {
                            if (col.label === h || col.key === h) colMap[index] = col.key;
                        });
                    });

                    var imported = [];
                    for (var i = 1; i < lines.length; i++) {
                        var cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, '') });
                        var row = { id: nextId++ };
                        columns.forEach(function(col) {
                            if (col.type === 'checkbox') row[col.key] = false;
                            else if (col.type === 'number') row[col.key] = 0;
                            else if (col.type === 'select' && col.options && col.options.length) row[col.key] =
                                col.options[0];
                            else if (col.key === 'date') row[col.key] = new Date().toISOString().slice(0, 10);
                            else row[col.key] = '';
                        });
                        if (!row.priority) row.priority = 'Средний';
                        if (!row.pinned) row.pinned = false;
                        if (!row.archived) row.archived = false;
                        if (!row.updated_at) row.updated_at = new Date().toISOString();

                        for (var j = 0; j < cols.length; j++) {
                            var key = colMap[j];
                            if (key) {
                                var col = columns.find(function(c) { return c.key === key; });
                                if (col) {
                                    if (col.type === 'checkbox') {
                                        row[key] = cols[j] === 'Да' || cols[j] === 'TRUE' || cols[j] ===
                                            'true' || cols[j] === '1';
                                    } else if (col.type === 'number') {
                                        row[key] = parseFloat(cols[j]) || 0;
                                    } else {
                                        row[key] = cols[j] || '';
                                    }
                                }
                            }
                        }

                        var hasData = false;
                        columns.forEach(function(col) {
                            var val = row[col.key];
                            if (val && val !== '' && val !== 0 && val !== false) hasData = true;
                        });
                        if (hasData) imported.push(row);
                    }

                    if (imported.length) {
                        data = imported;
                        saveToLocalStorage();
                        render();
                        if (isOnline) scheduleSave();
                        showToast('✅ Импортировано ' + imported.length + ' записей (CSV)', 'success');
                    } else {
                        showToast('Не удалось импортировать данные', 'error');
                    }
                }
            };
            reader.readAsText(file, 'UTF-8');
            event.target.value = '';
        }

        function exportToClipboard() {
            if (!data.length) return showToast('Нет данных', 'error');
            var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
            var tsv = visible.map(function(c) { return c.label; }).join('\t') + '\n';
            data.forEach(function(r) {
                var row = visible.map(function(c) {
                    var val = r[c.key] !== undefined ? r[c.key] : '';
                    if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                    return String(val);
                });
                tsv += row.join('\t') + '\n';
            });
            navigator.clipboard.writeText(tsv).then(function() {
                showToast('📋 Скопировано', 'success');
            }).catch(function() {
                showToast('Не удалось скопировать', 'error');
            });
        }

        function sortTable(key) {
            if (sortColumn === key) {
                sortDirection *= -1;
            } else {
                sortColumn = key;
                sortDirection = 1;
            }
            render();
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(function(m) { m.classList.remove('active'); });
        }

        document.querySelectorAll('.modal').forEach(function(m) {
            m.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        });

        var toastTimeout;

        function showToast(msg, type) {
            type = type || '';
            var el = document.getElementById('toast');
            var icons = { success: '✅', error: '❌', warning: '⚠️' };
            el.innerHTML = '<span>' + (icons[type] || 'ℹ️') + '</span> ' + msg;
            el.className = 'toast';
            if (type) el.classList.add(type);
            el.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() { el.classList.remove('show'); }, 3500);
        }

        document.getElementById('filterInput').addEventListener('input', render);
        document.getElementById('filterStatus').addEventListener('change', render);
        document.getElementById('gotoIdInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') goToId();
        });

        loadFromCloud();

        console.log('⚡ CRM загружена');
        console.log('📌 СТОЛБЦЫ ОПТИМИЗИРОВАНЫ:');
        console.log('   → ОЦЕНКИ (бывший email)');
        console.log('   → КОММЕНТАРИЙ (новое поле)');
        console.log('   → УБРАН "След. контакт"');
        console.log('   → Строки компактнее');
        console.log('📌 СОРТИРОВКА по всем столбцам');
        console.log('✅ СТАТУС меняется через выпадающий список');
    </script>
