<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro — Дашборд</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- NAVIGATION -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="logo-icon"><i class="fas fa-handshake"></i></div>
                <span>Pro<span>CRM</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active"><i class="fas fa-chart-pie"></i> Дашборд</a>
                <a href="clients.html"><i class="fas fa-users"></i> Клиенты</a>
                <a href="import.html"><i class="fas fa-file-import"></i> Импорт</a>
                <a href="analytics.html"><i class="fas fa-chart-bar"></i> Аналитика</a>
                <a href="settings.html"><i class="fas fa-cog"></i> Настройки</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <span class="badge">v2.0</span>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="main">
            <div class="page-header">
                <h1><i class="fas fa-chart-pie"></i> Дашборд</h1>
                <p>Общая статистика по всем клиентам</p>
            </div>

            <!-- STATS CARDS -->
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalClients">0</span>
                        <span class="stat-label">Всего клиентов</span>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="dealClients">0</span>
                        <span class="stat-label">Сделки</span>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon"><i class="fas fa-phone"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="activeClients">0</span>
                        <span class="stat-label">В работе</span>
                    </div>
                </div>
                <div class="stat-card info">
                    <div class="stat-icon"><i class="fas fa-star"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="favoriteClients">0</span>
                        <span class="stat-label">Избранные</span>
                    </div>
                </div>
            </div>

            <!-- CHARTS -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Статусы клиентов</h3>
                    <div class="chart-container" id="statusChart">
                        <div class="chart-bar">
                            <div class="bar-label">Новые</div>
                            <div class="bar-track"><div class="bar-fill" id="barNew" style="width:0%;"></div></div>
                            <div class="bar-value" id="barNewVal">0</div>
                        </div>
                        <div class="chart-bar">
                            <div class="bar-label">В работе</div>
                            <div class="bar-track"><div class="bar-fill" id="barContacted" style="width:0%;"></div></div>
                            <div class="bar-value" id="barContactedVal">0</div>
                        </div>
                        <div class="chart-bar">
                            <div class="bar-label">Сделки</div>
                            <div class="bar-track"><div class="bar-fill" id="barDeal" style="width:0%;"></div></div>
                            <div class="bar-value" id="barDealVal">0</div>
                        </div>
                        <div class="chart-bar">
                            <div class="bar-label">Потеряно</div>
                            <div class="bar-track"><div class="bar-fill" id="barLost" style="width:0%;"></div></div>
                            <div class="bar-value" id="barLostVal">0</div>
                        </div>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Топ-5 категорий</h3>
                    <div id="topCategories">
                        <div class="empty-state">Загрузка...</div>
                    </div>
                </div>
            </div>

            <!-- RECENT ACTIVITY -->
            <div class="activity-card">
                <h3><i class="fas fa-clock"></i> Последние изменения</h3>
                <div id="recentActivity">
                    <div class="empty-state">Нет активности</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', function() {
                const html = document.documentElement;
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.querySelector('i').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            });

            // Load stats
            loadDashboardStats();
        });

        async function loadDashboardStats() {
            try {
                const data = await loadFromBin();
                const records = data || [];

                // Stats
                document.getElementById('totalClients').textContent = records.length;
                document.getElementById('dealClients').textContent = records.filter(r => r.status === 'deal').length;
                document.getElementById('activeClients').textContent = records.filter(r => r.status === 'contacted' || r.status === 'meeting').length;
                document.getElementById('favoriteClients').textContent = records.filter(r => r.favorite).length;

                // Status chart
                const statuses = ['new', 'contacted', 'deal', 'lost'];
                const labels = ['Новые', 'В работе', 'Сделки', 'Потеряно'];
                const maxVal = records.length || 1;
                statuses.forEach((s, i) => {
                    const count = records.filter(r => r.status === s).length;
                    const percent = (count / maxVal) * 100;
                    document.getElementById(`bar${s.charAt(0).toUpperCase() + s.slice(1)}`).style.width = `${percent}%`;
                    document.getElementById(`bar${s.charAt(0).toUpperCase() + s.slice(1)}Val`).textContent = count;
                });

                // Top categories
                const categories = {};
                records.forEach(r => {
                    const cat = r.category || 'Без категории';
                    categories[cat] = (categories[cat] || 0) + 1;
                });
                const sorted = Object.entries(categories).sort((a, b) => b[1] - a[1]).slice(0, 5);
                const container = document.getElementById('topCategories');
                if (sorted.length === 0) {
                    container.innerHTML = '<div class="empty-state">Нет данных</div>';
                } else {
                    container.innerHTML = sorted.map(([cat, count]) =>
                        `<div class="category-item"><span>${cat}</span><span class="count">${count}</span></div>`
                    ).join('');
                }

                // Recent activity
                const activities = [];
                records.forEach(r => {
                    if (r.history && r.history.length) {
                        r.history.forEach(h => {
                            activities.push({ ...h, name: r.name });
                        });
                    }
                });
                activities.sort((a, b) => new Date(b.date) - new Date(a.date));
                const recent = activities.slice(0, 10);
                const activityContainer = document.getElementById('recentActivity');
                if (recent.length === 0) {
                    activityContainer.innerHTML = '<div class="empty-state">Нет активности</div>';
                } else {
                    activityContainer.innerHTML = recent.map(a =>
                        `<div class="activity-item">
                            <span class="activity-icon"><i class="fas fa-circle" style="color:var(--btn-primary);"></i></span>
                            <span class="activity-text"><strong>${a.name}</strong> — ${a.note}</span>
                            <span class="activity-time">${a.date}</span>
                        </div>`
                    ).join('');
                }
            } catch (e) {
                console.error('Ошибка загрузки дашборда:', e);
            }
        }
    </script>
</body>
</html>
