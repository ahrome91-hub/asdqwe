<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CRM — Клиентская база</title>
    <style>
        /* ============================================================
           ДИЗАЙН В СТИЛЕ МЕССЕНДЖЕРА + ВСЯ ФУНКЦИОНАЛЬНОСТЬ
           ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0d10;
            --bg-secondary: #13181f;
            --bg-card: #1a212a;
            --bg-card-hover: #232c38;
            --bg-input: #0f141c;
            --bg-bubble: #1e2a3a;
            --bg-bubble-own: #2b3b5a;
            --border: #252f3d;
            --border-light: #1a2330;
            --text: #e8edf2;
            --text-secondary: #8e9fb1;
            --text-muted: #4a5a6e;
            --accent: #5b7cfa;
            --accent-glow: rgba(91, 124, 250, 0.15);
            --accent-dark: #4a6ae0;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-bubble: 18px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        [data-theme="light"] {
            --bg: #eef2f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --bg-input: #f1f5f9;
            --bg-bubble: #e8edf2;
            --bg-bubble-own: #dbeafe;
            --border: #e2e8f0;
            --border-light: #e2e8f0;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 0 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-secondary-rgb), 0.92);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }

        .header-info .name {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-info .status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .header-info .status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .header-info .status .dot.online { background: var(--success); }
        .header-info .status .dot.offline { background: var(--danger); }
        .header-info .status .dot.loading { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .badge-count {
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 10px;
            border-radius: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .header-right .btn-icon {
            background: var(--bg-input);
            border: none;
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-right .btn-icon:hover {
            background: var(--bg-card-hover);
            color: var(--text);
        }

        /* ============================================================
           TOOLBAR
           ============================================================ */
        .toolbar {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .toolbar .search {
            flex: 1;
            min-width: 120px;
            position: relative;
        }

        .toolbar .search input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .toolbar .search input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toolbar .search .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.4;
        }

        .toolbar .filters {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .toolbar .filters select,
        .toolbar .filters input[type="number"],
        .toolbar .filters input[type="date"] {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 12px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
            min-width: 70px;
        }

        .toolbar .filters select:focus,
        .toolbar .filters input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .toolbar .filters select option {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .toolbar .quick-filters {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            white-space: nowrap;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn:active { transform: scale(0.95); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:hover { background: var(--accent-dark); }

        .btn-success {
            background: var(--success);
            color: #fff;
            border: none;
        }
        .btn-success:hover { filter: brightness(1.1); }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border: none;
        }
        .btn-danger:hover { filter: brightness(1.1); }

        .btn-warning {
            background: var(--warning);
            color: #0f172a;
            border: none;
        }
        .btn-warning:hover { filter: brightness(1.1); }

        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-xs { padding: 3px 10px; font-size: 11px; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-secondary);
        }

        .btn-ghost {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 4px 10px;
        }
        .btn-ghost:hover { color: var(--text); background: var(--bg-card-hover); border-radius: 20px; }

        .save-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .save-status .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================================
           КАРТОЧКИ-СООБЩЕНИЯ
           ============================================================ */
        .messages {
            padding: 12px 16px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .message {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-bubble);
            padding: 14px 16px;
            transition: var(--transition);
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message:active { transform: scale(0.98); }
        .message.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .message-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .message-sender {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .message-sender .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .message-sender .msg-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
            word-break: break-word;
        }

        .message-sender .msg-sub {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .message-check {
            flex-shrink: 0;
            padding-top: 2px;
        }

        .message-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .message-body {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            margin-top: 4px;
            padding-left: 46px;
        }

        .message-field {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .message-field .label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .message-field .value {
            color: var(--text);
            font-weight: 500;
            word-break: break-word;
        }

        .message-field .value.success { color: var(--success); }
        .message-field .value.danger { color: var(--danger); }
        .message-field .value.warning { color: var(--warning); }
        .message-field .value.accent { color: var(--accent); }

        .message-field .editable {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            width: auto;
            min-width: 40px;
            max-width: 200px;
        }

        .message-field .editable:hover {
            border-color: var(--border);
            background: var(--bg-input);
        }

        .message-field .editable:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .message-field .editable-select {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
        }

        .message-field .editable-select:hover {
            border-color: var(--border);
            background: var(--bg-input);
        }

        .message-field .editable-select:focus {
            border-color: var(--accent);
            background: var(--bg-input);
            outline: none;
        }

        .message-field .editable-select option {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .message-field .editable-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .message-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .message-status.согласовано { background: rgba(52, 211, 153, 0.12); color: var(--success); }
        .message-status.отказ { background: rgba(248, 113, 113, 0.12); color: var(--danger); }
        .message-status.вработе { background: rgba(251, 191, 36, 0.12); color: var(--warning); }
        .message-status.отправлено { background: rgba(91, 124, 250, 0.12); color: var(--accent); }
        .message-status.черновик { background: rgba(142, 159, 177, 0.12); color: var(--text-secondary); }

        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            padding-left: 46px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border-light);
            padding-top: 8px;
        }

        .message-actions .btn {
            padding: 3px 12px;
            font-size: 12px;
        }

        .message-priority {
            display: inline-block;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .message-priority.high { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
        .message-priority.medium { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .message-priority.low { background: rgba(52, 211, 153, 0.15); color: var(--success); }

        .sort-indicator {
            display: inline-block;
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.4;
            cursor: pointer;
        }
        .sort-indicator.active { opacity: 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            backdrop-filter: blur(12px);
            background: rgba(var(--bg-secondary-rgb), 0.92);
        }

        .footer .stats {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer .stats strong {
            color: var(--text);
        }

        .footer .stats .value {
            color: var(--accent);
            font-weight: 600;
        }

        .footer .mass-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            flex: 1;
        }

        .footer .mass-actions .info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer .mass-actions select {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 12px;
            outline: none;
            font-family: inherit;
        }

        .footer .mass-actions select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .footer .right {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: var(--bg-card);
            color: var(--text);
            padding: 12px 24px;
            border-radius: var(--radius-bubble);
            border: 1px solid var(--border);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            font-size: 13px;
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast.warning { border-color: var(--warning); }

        /* ============================================================
           МОДАЛКИ
           ============================================================ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal-content h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .modal-content .sub {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .modal-content label {
            display: block;
            margin: 10px 0 4px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .modal-content input:focus,
        .modal-content select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .modal-actions .btn { padding: 9px 20px; }

        .column-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0;
        }

        .column-settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            background: var(--bg-input);
            border-radius: 20px;
            border: 1px solid var(--border);
            margin: 0;
            font-weight: 400;
        }

        .column-settings label:hover { background: var(--bg-card-hover); }
        .column-settings label input[type="checkbox"] { width: 14px; height: 14px; }

        /* ============================================================
           МОБИЛЬНАЯ ВЕРСИЯ
           ============================================================ */
        @media (max-width: 820px) {
            .header { padding: 10px 14px; }
            .header .avatar { width: 36px; height: 36px; font-size: 15px; }
            .header-info .name { font-size: 15px; }
            .header-right .btn-icon { width: 34px; height: 34px; font-size: 14px; }

            .toolbar { padding: 8px 12px; gap: 6px; }
            .toolbar .search input { font-size: 13px; padding: 8px 12px 8px 34px; }
            .toolbar .filters select,
            .toolbar .filters input { font-size: 11px; padding: 6px 10px; min-width: 60px; }
            .btn { font-size: 12px; padding: 6px 12px; }

            .messages { padding: 8px 10px 20px; gap: 8px; }
            .message { padding: 12px 14px; }
            .message-sender .msg-avatar { width: 32px; height: 32px; font-size: 12px; }
            .message-sender .msg-name { font-size: 14px; }
            .message-body { padding-left: 42px; gap: 2px 10px; }
            .message-field { font-size: 12px; }
            .message-field .editable { font-size: 12px; max-width: 120px; }
            .message-actions { padding-left: 42px; }
            .message-actions .btn { font-size: 11px; padding: 2px 10px; }

            .footer { padding: 10px 14px; gap: 8px; }
            .footer .stats { font-size: 11px; gap: 10px; }
            .footer .mass-actions select { font-size: 11px; padding: 3px 8px; }
            .footer .right .btn { font-size: 11px; padding: 4px 10px; }

            .badge-count { font-size: 10px; padding: 1px 8px; }
            .save-status { font-size: 10px; padding: 2px 10px; }
        }

        @media (max-width: 480px) {
            .header { padding: 8px 12px; }

<script>
    // ================================================================
    // КОНФИГУРАЦИЯ
    // ================================================================
    var BIN_ID = '6a34730dda38895dfeda3121';
    var API_KEY = '$2a$10$euK6kkgJrxsrsI06lUXdu.Zyp1byoA3eVeev6S/Kiol96uQejCvKa';

    // ================================================================
    // СОСТОЯНИЕ
    // ================================================================
    var data = [];
    var nextId = 1;
    var isSaving = false;
    var saveTimeout = null;
    var isOnline = false;
    var selectedIds = [];
    var visibleColumns = {};
    var sortField = null;
    var sortDirection = 1;

    var columns = [
        { key: 'client', label: 'Клиент', type: 'text' },
        { key: 'proposal', label: 'КП', type: 'text' },
        { key: 'amount', label: 'Сумма', type: 'number' },
        { key: 'date', label: 'Дата', type: 'date' },
        { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
        { key: 'agreed', label: 'Согласен', type: 'checkbox' },
        { key: 'comment', label: 'Комментарий', type: 'text' },
        { key: 'phone', label: 'Телефон', type: 'text' },
        { key: 'email', label: 'Email', type: 'text' },
        { key: 'priority', label: 'Приоритет', type: 'select', options: ['Низкий', 'Средний', 'Высокий'] }
    ];

    columns.forEach(function(col) { visibleColumns[col.key] = true; });

    // ================================================================
    // QUIC-ФИКС
    // ================================================================
    var originalFetch = window.fetch;
    window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('api.jsonbin.io')) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Connection'] = 'close';
            var separator = url.includes('?') ? '&' : '?';
            url = url + separator + '_=' + Date.now();
            return originalFetch(url, options);
        }
        return originalFetch(url, options);
    };

    // ================================================================
    // ТЕМА
    // ================================================================
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('crm_theme', next);
    }

    function loadTheme() {
        var theme = localStorage.getItem('crm_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    }
    loadTheme();

    // ================================================================
    // ЗАГРУЗКА
    // ================================================================
    async function loadFromCloud() {
        try {
            setStatus('loading', 'Загрузка...');
            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest?cors=true', {
                headers: { 'X-Master-Key': API_KEY }
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            var result = await resp.json();
            var loaded = result.record;

            if (loaded && Array.isArray(loaded) && loaded.length > 0) {
                data = loaded;
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                    if (row.priority === undefined) row.priority = 'Средний';
                });
                nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                isOnline = true;
                setStatus('online', 'Онлайн');
                render();
                saveToLocalStorage();
                showToast('✅ Загружено ' + data.length + ' записей', 'success');
                return;
            }
            loadFromLocalStorage();
        } catch (e) {
            console.warn('Облако недоступно:', e);
            isOnline = false;
            setStatus('offline', 'Офлайн');
            loadFromLocalStorage();
        }
    }

    // ================================================================
    // ЛОКАЛЬНОЕ ХРАНИЛИЩЕ
    // ================================================================
    function saveToLocalStorage() {
        try {
            localStorage.setItem('crm_data', JSON.stringify(data));
            localStorage.setItem('crm_nextId', String(nextId));
            localStorage.setItem('crm_columns', JSON.stringify(columns));
            localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
            document.getElementById('savingText').textContent = '💾 Сохранено';
            document.getElementById('savingSpinner').style.display = 'none';
        } catch (e) {
            console.error('Ошибка сохранения в localStorage:', e);
        }
    }

    function loadFromLocalStorage() {
        try {
            var stored = localStorage.getItem('crm_data');
            var storedId = localStorage.getItem('crm_nextId');
            var storedCols = localStorage.getItem('crm_columns');
            var storedVisible = localStorage.getItem('crm_visible_columns');

            if (storedVisible) {
                var parsedVisible = JSON.parse(storedVisible);
                if (parsedVisible) visibleColumns = parsedVisible;
            }

            if (storedCols) {
                var parsedCols = JSON.parse(storedCols);
                if (Array.isArray(parsedCols) && parsedCols.length > 0) {
                    columns = parsedCols;
                }
            }

            if (stored) {
                data = JSON.parse(stored);
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                    if (row.priority === undefined) row.priority = 'Средний';
                });
                if (storedId) {
                    nextId = parseInt(storedId, 10);
                } else {
                    nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                }
                render();
                showToast('📁 Загружено из кеша', 'success');
                return;
            }
            resetData();
        } catch (e) {
            console.error('Ошибка загрузки из localStorage:', e);
            resetData();
        }
    }

    // ================================================================
    // СОХРАНЕНИЕ
    // ================================================================
    async function saveToCloud() {
        if (isSaving) return;
        isSaving = true;
        showSaving(true, 'Сохранение...');

        try {
            var cleanData = data.map(function(row) {
                var clean = {};
                for (var key in row) {
                    if (row[key] === undefined || row[key] === null) clean[key] = '';
                    else if (typeof row[key] === 'string') {
                        clean[key] = row[key].replace(/[\x00-\x1F\x7F-\x9F]/g, '');
                    } else clean[key] = row[key];
                }
                return clean;
            });

            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '?cors=true', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(cleanData)
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            isSaving = false;
            isOnline = true;
            setStatus('online', 'Онлайн');
            showSaving(false, '💾 Сохранено');
            saveToLocalStorage();
            showToast('💾 Сохранено в облаке', 'success');
        } catch (e) {
            console.error('Ошибка сохранения:', e);
            isSaving = false;
            isOnline = false;
            setStatus('offline', 'Офлайн');
            showSaving(false, '📁 Локально');
            saveToLocalStorage();
            showToast('⚠️ Ошибка: сохранено локально', 'error');
        }
    }

    function scheduleSave() {
        clearTimeout(saveTimeout);
        showSaving(true, 'Сохранение...');
        saveTimeout = setTimeout(function() {
            if (isOnline) saveToCloud();
            else { saveToLocalStorage(); showSaving(false, '📁 Локально'); }
        }, 800);
    }

    // ================================================================
    // ИНДИКАТОРЫ
    // ================================================================
    function setStatus(type, text) {
        var dot = document.getElementById('statusDot');
        var el = document.getElementById('statusText');
        dot.className = 'dot';
        if (type === 'online') dot.classList.add('online');
        else if (type === 'offline') dot.classList.add('offline');
        else dot.classList.add('loading');
        el.textContent = text;
    }

    function showSaving(active, text) {
        document.getElementById('savingSpinner').style.display = active ? 'inline-block' : 'none';
        if (text) document.getElementById('savingText').textContent = text;
    }

    // ================================================================
    // ОСНОВНОЙ РЕНДЕР
    // ================================================================
    function render() {
        renderMessages();
        updateCounters();
        updateMassActions();
        document.getElementById('countBadge').textContent = data.length;
    }

    // ================================================================
    // РЕНДЕР КАРТОЧЕК
    // ================================================================
    function renderMessages() {
        var container = document.getElementById('messagesContainer');
        var filtered = getFilteredData();

        if (!filtered.length) {
            container.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><h3>Нет сообщений</h3></div>';
            return;
        }

        var html = '';
        filtered.forEach(function(row) {
            var statusClass = (row.status || 'Черновик').toLowerCase().replace(/ /g, '');
            var isSelected = selectedIds.indexOf(row.id) !== -1;
            var priorityLabels = { 'Низкий': 'low', 'Средний': 'medium', 'Высокий': 'high' };
            var priorityClass = priorityLabels[row.priority] || 'medium';
            var priorityEmoji = { 'Низкий': '🟢', 'Средний': '🟡', 'Высокий': '🔴' };

            html += '<div class="message ' + (isSelected ? 'selected' : '') + '">';
            html += '<div class="message-header">';
            html += '<div class="message-sender">';
            html += '<div class="msg-avatar">' + (row.client ? row.client.charAt(0).toUpperCase() : '?') + '</div>';
            html += '<div>';
            html += '<div class="msg-name">' + renderEditable(row, 'client') + ' ';
            html += '<span class="message-priority ' + priorityClass + '">' + (priorityEmoji[row.priority] || '🟡') + ' ' + (row.priority || 'Средний') + '</span>';
            html += '</div>';
            html += '<div class="msg-sub">' + renderEditable(row, 'proposal') + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="message-check"><input type="checkbox" ' + (isSelected ? 'checked' : '') + ' onchange="toggleSelect(' + row.id + ', this.checked)" /></div>';
            html += '</div>';

            html += '<div class="message-body">';
            // Сумма
            html += '<div class="message-field"><span class="label">Сумма</span><span class="value">' + renderEditable(row, 'amount') + ' ₽</span></div>';
            // Дата
            html += '<div class="message-field"><span class="label">Дата</span><span class="value">' + renderEditable(row, 'date') + '</span></div>';
            // Статус
            html += '<div class="message-field"><span class="label">Статус</span><span class="message-status ' + statusClass + '">' + renderEditableSelect(row, 'status') + '</span></div>';
            // Согласен
            html += '<div class="message-field"><span class="label">Согласен</span><span class="value">' + renderEditableCheckbox(row, 'agreed') + '</span></div>';
            // Телефон
            if (visibleColumns['phone'] !== false) {
                html += '<div class="message-field"><span class="label">Телефон</span><span class="value">' + renderEditable(row, 'phone') + '</span></div>';
            }
            // Email
            if (visibleColumns['email'] !== false) {
                html += '<div class="message-field"><span class="label">Email</span><span class="value">' + renderEditable(row, 'email') + '</span></div>';
            }
            // Комментарий
            if (visibleColumns['comment'] !== false) {
                html += '<div class="message-field"><span class="label">Комментарий</span><span class="value">' + renderEditable(row, 'comment') + '</span></div>';
            }
            // Приоритет
            if (visibleColumns['priority'] !== false) {
                html += '<div class="message-field"><span class="label">Приоритет</span><span class="value">' + renderEditableSelect(row, 'priority') + '</span></div>';
            }
            html += '</div>';

            html += '<div class="message-actions">';
            html += '<button class="btn btn-sm btn-outline" onclick="copyRow(' + row.id + ')">📋 Копировать</button>';
            html += '<button class="btn btn-sm btn-outline" onclick="togglePriority(' + row.id + ')">🏷️ Приоритет</button>';

    function renderEditable(row, key) {

        } else if (col.type === 'date') {

        } else {
            return '<input class="editable" type="text" value="' + escapeHtml(String(value)) + '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" placeholder="..." />';
        }
    }

    function renderEditableSelect(row, key) {

    // ================================================================
    // ФИЛЬТРАЦИЯ И СОРТИРОВКА
    // ================================================================
    function getFilteredData() {
        var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
        var filterStatus = document.getElementById('filterStatus').value;
        var filterAmountMin = parseFloat(document.getElementById('filterAmountMin').value);
        var filterAmountMax = parseFloat(document.getElementById('filterAmountMax').value);
        var filterDateFrom = document.getElementById('filterDateFrom').value;
        var filterDateTo = document.getElementById('filterDateTo').value;

        var filtered = data.filter(function(row) {
            var matchText = false;
            columns.forEach(function(col) {
                var val = row[col.key] || '';
                if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
            });
            var statusMatch = filterStatus === '' || row.status === filterStatus;
            var amountMatch = true;
            if (!isNaN(filterAmountMin) && row.amount < filterAmountMin) amountMatch = false;
            if (!isNaN(filterAmountMax) && row.amount > filterAmountMax) amountMatch = false;
            var dateMatch = true;
            if (filterDateFrom && row.date < filterDateFrom) dateMatch = false;
            if (filterDateTo && row.date > filterDateTo) dateMatch = false;
            return matchText && statusMatch && amountMatch && dateMatch;
        });

        // Сортировка
        if (sortField) {
            filtered.sort(function(a, b) {
                var valA = a[sortField] || '';
                var valB = b[sortField] || '';
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return -sortDirection;
                if (valA > valB) return sortDirection;
                return 0;
            });
        }

        return filtered;
    }

    function sortBy(field) {
        if (sortField === field) {
            sortDirection *= -1;
        } else {
            sortField = field;
            sortDirection = 1;
        }
        render();
        showToast('📊 Сортировка: ' + field + (sortDirection === 1 ? ' ▲' : ' ▼'), 'success');
    }

    function exportCSV() {
        if (!data.length) return showToast('Нет данных для экспорта', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var headers = visible.map(function(c) { return c.label; });
        var rows = data.map(function(r) {
            return visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return '"' + String(val).replace(/"/g, '""') + '"';
            });
        });
        var csv = [headers.join(',')];
        rows.forEach(function(row) { csv.push(row.join(',')); });
        csv = csv.join('\n');
        var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'клиенты_' + new Date().toISOString().slice(0, 10) + '.csv';
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📤 CSV скачан', 'success');
    }

    function handleImport(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var text = ev.target.result;
            try {
                var parsed = JSON.parse(text);
                if (Array.isArray(parsed) && parsed.length) {
                    parsed.forEach(function(row) {
                        row.id = nextId++;
                        if (row.email === undefined) row.email = '';
                        if (row.comment === undefined) row.comment = '';
                        if (row.phone === undefined) row.phone = '';
                        if (row.priority === undefined) row.priority = 'Средний';
                    });
                    data = parsed;
                    saveToLocalStorage();
                    render();
                    if (isOnline) scheduleSave();
                    showToast('✅ Импортировано ' + data.length + ' записей (JSON)', 'success');
                    return;
                }
            } catch(e) {
                var lines = text.split('\n').filter(function(l) { return l.trim(); });
                if (lines.length < 2) { showToast('Файл пуст или неверный формат', 'error'); return; }

                var headerLine = lines[0];
                var headers = headerLine.split(',').map(function(h) { return h.trim().replace(/^"|"$/g, ''); });

                var colMap = {};
                headers.forEach(function(h, index) {
                    columns.forEach(function(col) {
                        if (col.label === h || col.key === h) colMap[index] = col.key;
                    });
                });

                var imported = [];
                for (var i = 1; i < lines.length; i++) {
                    var cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
                    var row = { id: nextId++ };
                    columns.forEach(function(col) {
                        if (col.type === 'checkbox') row[col.key] = false;
                        else if (col.type === 'number') row[col.key] = 0;
                        else if (col.type === 'select' && col.options && col.options.length) row[col.key] = col.options[0];
                        else if (col.key === 'date') row[col.key] = new Date().toISOString().slice(0, 10);
                        else row[col.key] = '';
                    });
                    if (!row.priority) row.priority = 'Средний';

                    for (var j = 0; j < cols.length; j++) {
                        var key = colMap[j];
                        if (key) {
                            var col = columns.find(function(c) { return c.key === key; });
                            if (col) {
                                if (col.type === 'checkbox') {
                                    row[key] = cols[j] === 'Да' || cols[j] === 'TRUE' || cols[j] === 'true' || cols[j] === '1';
                                } else if (col.type === 'number') {
                                    row[key] = parseFloat(cols[j]) || 0;
                                } else {
                                    row[key] = cols[j] || '';
                                }
                            }
                        }
                    }

                    var hasData = false;
                    columns.forEach(function(col) {
                        var val = row[col.key];
                        if (val && val !== '' && val !== 0 && val !== false) hasData = true;
                    });
                    if (hasData) imported.push(row);
                }

                if (imported.length) {
                    data = imported;
                    saveToLocalStorage();
                    render();
                    if (isOnline) scheduleSave();
                    showToast('✅ Импортировано ' + imported.length + ' записей (CSV)', 'success');
                } else {
                    showToast('Не удалось импортировать данные', 'error');
                }
            }
        };
        reader.readAsText(file, 'UTF-8');
        event.target.value = '';
    }

    function exportToClipboard() {
        if (!data.length) return showToast('Нет данных', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var tsv = visible.map(function(c) { return c.label; }).join('\t') + '\n';
        data.forEach(function(r) {
            var row = visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return String(val);
            });
            tsv += row.join('\t') + '\n';
        });
        navigator.clipboard.writeText(tsv).then(function() {
            showToast('📋 Скопировано', 'success');
        }).catch(function() {
            showToast('Не удалось скопировать', 'error');
        });
    }

    // ================================================================

    var toastTimeout;

    function showToast(msg, type) {
        type = type || '';
        var el = document.getElementById('toast');
        var icons = { success: '✅', error: '❌', warning: '⚠️' };
        el.innerHTML = '<span>' + (icons[type] || 'ℹ️') + '</span> ' + msg;
        el.className = 'toast';
        if (type) el.classList.add(type);
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(function() { el.classList.remove('show'); }, 3500);
    }
