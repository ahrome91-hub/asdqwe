<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM — Клиентская база</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0d10;
            color: #e8edf2;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.light-theme {
            background: #f0f2f5;
            color: #1a1f26;
        }

        body.light-theme .header { background: linear-gradient(145deg, #ffffff, #e8edf2); border-color: #d1d5db; }
        body.light-theme .header-left h1 { background: linear-gradient(135deg, #1a1f26, #4b5563); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.light-theme .toolbar { background: #ffffff; border-color: #d1d5db; }
        body.light-theme .toolbar input, body.light-theme .toolbar select { background: #f3f4f6; color: #1a1f26; border-color: #d1d5db; }
        body.light-theme .status-badge { background: #f3f4f6; border-color: #d1d5db; color: #4b5563; }
        body.light-theme .table-wrap { background: #ffffff; border-color: #d1d5db; }
        body.light-theme th { background: #f3f4f6; color: #4b5563; border-bottom-color: #d1d5db; }
        body.light-theme td { border-bottom-color: #e5e7eb; }
        body.light-theme tr:hover td { background: #f9fafb; }
        body.light-theme .footer-actions { background: #ffffff; border-color: #d1d5db; }
        body.light-theme .saving-indicator { background: #f3f4f6; border-color: #d1d5db; color: #4b5563; }
        body.light-theme .badge-count { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; }
        body.light-theme .btn-outline { border-color: #d1d5db; color: #4b5563; }
        body.light-theme .btn-outline:hover { background: #f3f4f6; }
        body.light-theme .counter { color: #4b5563; }
        body.light-theme .counter strong { color: #1a1f26; }
        body.light-theme .table-input { color: #1a1f26; }
        body.light-theme .table-input:hover { background: #f3f4f6; border-color: #d1d5db; }
        body.light-theme .table-select { color: #1a1f26; }
        body.light-theme .table-select:hover { background: #f3f4f6; border-color: #d1d5db; }
        body.light-theme .modal-content { background: #ffffff; border-color: #d1d5db; }
        body.light-theme .modal-content input, body.light-theme .modal-content select { background: #f3f4f6; color: #1a1f26; border-color: #d1d5db; }
        body.light-theme .modal-content h3 { color: #1a1f26; }
        body.light-theme .modal-content label { color: #4b5563; }
        body.light-theme .toast { background: #ffffff; color: #1a1f26; border-color: #d1d5db; }
        body.light-theme th .col-actions button { background: #f3f4f6; border-color: #d1d5db; color: #4b5563; }
        body.light-theme th .col-actions button:hover { background: #e5e7eb; color: #1a1f26; }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            padding: 14px 22px;
            background: linear-gradient(145deg, #14171c, #1a1f26);
            border-radius: 16px;
            border: 1px solid #252b33;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .header:hover {
            border-color: #2a323d;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-left .logo {
            font-size: 26px;
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.2));
            transition: transform 0.3s ease;
        }

        .header-left .logo:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .header-left h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #f0f4f8, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid #2a323d;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: #1e242c;
            border-color: #4b5563;
        }

        .badge-count {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.2);
            animation: pulse 2s infinite;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #94a3b8;
            background: #1e242c;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #2a323d;
            transition: all 0.3s ease;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .status-badge .dot.online { background: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); }
        .status-badge .dot.offline { background: #ef4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.4); }
        .status-badge .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
        .status-badge .dot.saving { background: #3b82f6; animation: pulse 0.5s infinite; }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding: 12px 18px;
            background: #14171c;
            border-radius: 14px;
            border: 1px solid #252b33;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .toolbar input,
        .toolbar select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #2a323d;
            background: #0f1217;
            color: #e8edf2;
            font-size: 13px;
            outline: none;
            min-width: 120px;
            transition: all 0.25s ease;
        }

        .toolbar input:focus,
        .toolbar select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            transform: scale(1.01);
        }

        .toolbar input::placeholder { color: #4b5563; }
        .toolbar select option { background: #14171c; color: #e8edf2; }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover::after { opacity: 1; }
        .btn:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3); }
        .btn:active { transform: scale(0.97); }

        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; box-shadow: 0 0 20px rgba(37, 99, 235, 0.15); }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(37, 99, 235, 0.25); }
        .btn-success { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
        .btn-success:hover { box-shadow: 0 0 30px rgba(22, 163, 74, 0.25); }
        .btn-outline { background: transparent; border: 1px solid #2a323d; color: #cbd5e1; }
        .btn-outline:hover { background: #1e242c; border-color: #4b5563; box-shadow: 0 0 20px rgba(255, 255, 255, 0.03); }
        .btn-danger { background: linear-gradient(135deg, #dc2626, #b91c1c); color: #fff; }
        .btn-danger:hover { box-shadow: 0 0 30px rgba(220, 38, 38, 0.25); }
        .btn-warning { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
        .btn-warning:hover { box-shadow: 0 0 30px rgba(217, 119, 6, 0.25); }
        .btn-info { background: linear-gradient(135deg, #0891b2, #0e7490); color: #fff; }
        .btn-info:hover { box-shadow: 0 0 30px rgba(8, 145, 178, 0.25); }

        .saving-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
            background: #1a1f26;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #252b33;
            margin-left: auto;
        }

        .saving-indicator .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #2a323d;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .table-wrap {
            background: #14171c;
            border-radius: 14px;
            border: 1px solid #252b33;
            overflow: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 900px;
        }

        th {
            background: linear-gradient(180deg, #0f1217, #14171c);
            color: #94a3b8;
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #252b33;
            position: sticky;
            top: 0;
            z-index: 2;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        th:hover { background: #1a1f26; }
        th.sort-asc::after { content: ' ▲'; }
        th.sort-desc::after { content: ' ▼'; }

        th .col-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        th .col-actions button {
            background: #1a1f26;
            border: 1px solid #2a323d;
            color: #94a3b8;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        th .col-actions button:hover { background: #2a323d; color: #e8edf2; }

        td {
            padding: 6px 8px;
            border-bottom: 1px solid #1e242c;
            vertical-align: middle;
            transition: all 0.2s ease;
        }

        tr:hover td { background: #1a1f26; }
        tr { animation: fadeIn 0.3s ease; }
        tr.selected td { background: #1a2a4a; }

        /* Цветные статусы */
        .status-cell {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-согласовано .status-cell { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
        .status-отказ .status-cell { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
        .status-вработе .status-cell { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
        .status-отправлено .status-cell { background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f640; }
        .status-черновик .status-cell { background: #6b728020; color: #94a3b8; border: 1px solid #6b728040; }

        tr.status-согласовано td:first-child { border-left: 4px solid #22c55e; }
        tr.status-отказ td:first-child { border-left: 4px solid #ef4444; }
        tr.status-вработе td:first-child { border-left: 4px solid #f59e0b; }
        tr.status-отправлено td:first-child { border-left: 4px solid #3b82f6; }
        tr.status-черновик td:first-child { border-left: 4px solid #6b7280; }

        .table-input {
            width: 100%;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: #e8edf2;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.25s ease;
        }

        .table-input:hover { border-color: #2a323d; background: #0f1217; }
        .table-input:focus { border-color: #2563eb; background: #0f1217; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); transform: scale(1.01); }

        .table-select {
            width: 100%;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: #e8edf2;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .table-select:hover { border-color: #2a323d; background: #0f1217; }
        .table-select:focus { border-color: #2563eb; background: #0f1217; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .table-select option { background: #14171c; color: #e8edf2; }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #2563eb;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        input[type="checkbox"]:hover { transform: scale(1.1); }
        .td-checkbox { text-align: center; }

        .btn-sm {
            padding: 2px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-sm-del { background: #2a0a0a; color: #f87171; }
        .btn-sm-del:hover { background: #3f0a0a; color: #fca5a5; transform: scale(1.05); }
        .btn-sm-copy { background: #0a2a4a; color: #60a5fa; }
        .btn-sm-copy:hover { background: #0a3a6a; color: #93bbfc; transform: scale(1.05); }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
            padding: 12px 18px;
            background: #14171c;
            border-radius: 14px;
            border: 1px solid #252b33;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .counter { font-size: 13px; color: #94a3b8; }
        .counter strong { color: #e8edf2; font-weight: 500; }

        .footer-actions .btn { font-size: 12px; padding: 4px 12px; }

        .empty-state, .loading {
            text-align: center;
            padding: 40px 20px;
            color: #4b5563;
        }

        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; display: block; animation: pulse 2s infinite; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e242c;
            color: #e8edf2;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid #2a323d;
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: #22c55e; }
        .toast.error { border-color: #ef4444; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1a1f26;
            border: 1px solid #2a323d;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .modal-content h3 { margin-bottom: 16px; color: #e8edf2; }
        .modal-content label { display: block; margin: 8px 0 4px; color: #94a3b8; font-size: 13px; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a323d;
            background: #0f1217;
            color: #e8edf2;
            font-size: 13px;
            outline: none;
        }
        .modal-content input:focus, .modal-content select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
        .modal-actions .btn { padding: 8px 16px; }

        .column-settings {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }
        .column-settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 10px;
            background: #0f1217;
            border-radius: 6px;
            border: 1px solid #2a323d;
        }
        .column-settings label:hover { background: #1a1f26; }

        .mass-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .header { flex-direction: column; align-items: stretch; padding: 10px; }
            .header-left h1 { font-size: 17px; }
            .header-actions { justify-content: flex-end; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar input, .toolbar select { min-width: auto; }
            .saving-indicator { margin-left: 0; }
            .table-wrap { font-size: 12px; }
            th, td { padding: 4px 4px; }
            .btn { justify-content: center; font-size: 12px; padding: 4px 10px; }
            .footer-actions { flex-direction: column; align-items: stretch; }
            .mass-actions { flex-wrap: wrap; }

            /* Карточки на телефонах */
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead { display: none; }
            tr {
                display: block;
                margin-bottom: 12px;
                border: 1px solid #252b33;
                border-radius: 10px;
                padding: 10px;
                background: #14171c;
            }
            tr:hover td { background: transparent; }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 4px 0;
                border: none;
                border-bottom: 1px solid #1e242c;
                gap: 8px;
            }
            td:last-child { border-bottom: none; }
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #94a3b8;
                font-size: 11px;
                text-transform: uppercase;
                min-width: 80px;
            }
            td .table-input, td .table-select {
                width: auto;
                flex: 1;
                text-align: right;
                padding: 2px 6px;
            }
            td .status-cell { font-size: 11px; padding: 2px 10px; }
            .td-checkbox { justify-content: center; }
            .td-checkbox::before { content: ''; display: none; }
        }

        .table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-wrap::-webkit-scrollbar-track { background: #0f1217; }
        .table-wrap::-webkit-scrollbar-thumb { background: #2a323d; border-radius: 10px; }
        .table-wrap::-webkit-scrollbar-thumb:hover { background: #3a434d; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="header-left">
            <span class="logo">⚡</span>
            <h1>CRM — Клиентская база</h1>
            <span class="badge-count" id="countBadge">0</span>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">🌓</button>
            <div class="status-badge">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">Подключение...</span>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <input type="text" id="filterInput" placeholder="🔍 Поиск..." />
        <select id="filterStatus">
            <option value="">Все статусы</option>
            <option value="Согласовано">✅ Согласовано</option>
            <option value="Отказ">❌ Отказ</option>
            <option value="В работе">⚡ В работе</option>
            <option value="Отправлено">📤 Отправлено</option>
            <option value="Черновик">📝 Черновик</option>
        </select>
        <input type="number" id="filterAmountMin" placeholder="Сумма от" style="min-width:80px;" />
        <input type="number" id="filterAmountMax" placeholder="Сумма до" style="min-width:80px;" />
        <input type="date" id="filterDateFrom" style="min-width:100px;" />
        <input type="date" id="filterDateTo" style="min-width:100px;" />
        <button class="btn btn-primary" onclick="addRow()">➕ Добавить</button>
        <button class="btn btn-success" onclick="exportCSV()">📤 CSV</button>
        <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">📥 Импорт</button>
        <button class="btn btn-danger" onclick="resetData()">🔄 Сброс</button>
        <button class="btn btn-warning" onclick="forceSave()">💾 Сохранить</button>
        <span class="saving-indicator">
            <span class="spinner" id="savingSpinner"></span>
            <span id="savingText">📁 Локально</span>
        </span>
    </div>

    <div class="table-wrap">
        <table>
            <thead id="tableHead">
                <tr id="headerRow"></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10"><div class="loading">⏳ Загрузка данных...</div></td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-actions">
        <span class="counter">Всего: <strong id="rowCounter">0</strong></span>
        <span class="counter">Согласны: <strong id="agreedCounter">0</strong></span>
        <span class="counter">Общая сумма: <strong id="totalAmount">0</strong></span>
        <div class="mass-actions">
            <span style="font-size:12px;color:#94a3b8;">Выделено: <strong id="selectedCount">0</strong></span>
            <button class="btn btn-danger btn-sm" onclick="massDelete()" style="display:none;" id="massDeleteBtn">🗑 Удалить</button>
            <select id="massStatusSelect" style="display:none;padding:2px 8px;font-size:12px;border-radius:6px;border:1px solid #2a323d;background:#0f1217;color:#e8edf2;">
                <option value="">Изменить статус</option>
                <option value="Согласовано">Согласовано</option>
                <option value="Отказ">Отказ</option>
                <option value="В работе">В работе</option>
                <option value="Отправлено">Отправлено</option>
                <option value="Черновик">Черновик</option>
            </select>
            <button class="btn btn-warning btn-sm" onclick="massStatus()" style="display:none;" id="massStatusBtn">📝 Применить</button>
        </div>
        <button class="btn btn-outline" onclick="exportToClipboard()">📋 Копировать</button>
        <button class="btn btn-outline" onclick="showColumnSettings()">⚙️ Столбцы</button>
    </div>
</div>

<div class="modal" id="addColumnModal">
    <div class="modal-content">
        <h3>➕ Добавить столбец</h3>
        <label>Название столбца (ключ):</label>
        <input type="text" id="newColumnKey" placeholder="например: city" />
        <label>Отображаемое имя:</label>
        <input type="text" id="newColumnLabel" placeholder="например: Город" />
        <label>Тип данных:</label>
        <select id="newColumnType">
            <option value="text">Текст</option>
            <option value="number">Число</option>
            <option value="date">Дата</option>
            <option value="select">Выпадающий список</option>
            <option value="checkbox">Чекбокс</option>
        </select>
        <div id="selectOptionsContainer" style="display:none; margin-top:8px;">
            <label>Варианты (через запятую):</label>
            <input type="text" id="newColumnOptions" placeholder="например: Да,Нет,Возможно" />
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" onclick="addColumn()">Добавить</button>
        </div>
    </div>
</div>

<div class="modal" id="columnSettingsModal">
    <div class="modal-content">
        <h3>⚙️ Настройка столбцов</h3>
        <div class="column-settings" id="columnSettingsList"></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">Закрыть</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept=".csv" style="display:none" onchange="handleImport(event)" />

<script>
    // ================================================================
    // КОНФИГУРАЦИЯ
    // ================================================================
    var BIN_ID = '6a34730dda38895dfeda3121';
    var API_KEY = '$2a$10$euK6kkgJrxsrsI06lUXdu.Zyp1byoA3eVeev6S/Kiol96uQejCvKa';

    // ================================================================
    // СОСТОЯНИЕ
    // ================================================================
    var data = [];
    var nextId = 1;
    var isSaving = false;
    var saveTimeout = null;
    var isOnline = false;
    var sortColumn = null;
    var sortDirection = 1;
    var selectedIds = [];
    var visibleColumns = {};

    var columns = [
        { key: 'client', label: 'Клиент', type: 'text' },
        { key: 'proposal', label: 'КП (название)', type: 'text' },
        { key: 'amount', label: 'Сумма', type: 'number' },
        { key: 'date', label: 'Дата КП', type: 'date' },
        { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
        { key: 'agreed', label: 'Согласен', type: 'checkbox' },
        { key: 'comment', label: 'Комментарий', type: 'text' },
        { key: 'phone', label: 'Телефон', type: 'text' },
        { key: 'email', label: 'Email', type: 'text' }
    ];

    // Инициализация видимости столбцов
    columns.forEach(function(col) { visibleColumns[col.key] = true; });

    // ================================================================
    // QUIC-ФИКС ДЛЯ CHROME/EDGE
    // ================================================================
    var originalFetch = window.fetch;
    window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('api.jsonbin.io')) {
            options = options || {};
            options.headers = options.headers || {};
            options.headers['Connection'] = 'close';
            var separator = url.includes('?') ? '&' : '?';
            url = url + separator + '_=' + Date.now();
            return originalFetch(url, options);
        }
        return originalFetch(url, options);
    };
    console.log('✅ QUIC-фикс для Chrome/Edge применён');

    // ================================================================
    // ТЕМА
    // ================================================================
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('crm_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function loadTheme() {
        if (localStorage.getItem('crm_theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    }
    loadTheme();

    // ================================================================
    // ЗАГРУЗКА ИЗ ОБЛАКА
    // ================================================================
    async function loadFromCloud() {
        try {
            setStatus('loading', 'Загрузка...');
            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest?cors=true', {
                headers: { 'X-Master-Key': API_KEY }
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            var result = await resp.json();
            var loaded = result.record;

            if (loaded && Array.isArray(loaded) && loaded.length > 0) {
                data = loaded;
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                });
                nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                isOnline = true;
                setStatus('online', 'Онлайн ✅');
                render();
                saveToLocalStorage();
                showToast('✅ Данные загружены из облака (' + data.length + ' записей)', 'success');
                return;
            }
            loadFromLocalStorage();
        } catch (e) {
            console.warn('Облако недоступно:', e);
            isOnline = false;
            setStatus('offline', 'Офлайн ✏️');
            loadFromLocalStorage();
        }
    }

    // ================================================================
    // ЛОКАЛЬНОЕ ХРАНИЛИЩЕ
    // ================================================================
    function saveToLocalStorage() {
        try {
            localStorage.setItem('crm_data', JSON.stringify(data));
            localStorage.setItem('crm_nextId', String(nextId));
            localStorage.setItem('crm_columns', JSON.stringify(columns));
            localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
            document.getElementById('savingText').textContent = '💾 Сохранено';
            document.getElementById('savingSpinner').style.display = 'none';
        } catch (e) {
            console.error('Ошибка сохранения в localStorage:', e);
        }
    }

    function loadFromLocalStorage() {
        try {
            var stored = localStorage.getItem('crm_data');
            var storedId = localStorage.getItem('crm_nextId');
            var storedCols = localStorage.getItem('crm_columns');
            var storedVisible = localStorage.getItem('crm_visible_columns');

            if (storedVisible) {
                var parsedVisible = JSON.parse(storedVisible);
                if (parsedVisible) visibleColumns = parsedVisible;
            }

            if (storedCols) {
                var parsedCols = JSON.parse(storedCols);
                if (Array.isArray(parsedCols) && parsedCols.length > 0) {
                    columns = parsedCols;
                }
            }

            if (stored) {
                data = JSON.parse(stored);
                data.forEach(function(row) {
                    if (row.email === undefined) row.email = '';
                    if (row.comment === undefined) row.comment = '';
                    if (row.phone === undefined) row.phone = '';
                });
                if (storedId) {
                    nextId = parseInt(storedId, 10);
                } else {
                    nextId = data.reduce(function(max, r) { return Math.max(max, r.id || 0); }, 0) + 1;
                }
                render();
                showToast('📁 Загружено из локального хранилища', 'success');
                return;
            }
            resetData();
        } catch (e) {
            console.error('Ошибка загрузки из localStorage:', e);
            resetData();
        }
    }

    // ================================================================
    // СОХРАНЕНИЕ В ОБЛАКО
    // ================================================================
    function forceSave() {
        saveToLocalStorage();
        if (isOnline) {
            saveToCloud();
        } else {
            showToast('⚠️ Вы офлайн. Данные сохранены локально.', 'error');
        }
    }

    async function saveToCloud() {
        if (isSaving) return;
        isSaving = true;
        showSaving(true, 'Сохранение...');

        try {
            var cleanData = data.map(function(row) {
                var clean = {};
                for (var key in row) {
                    if (row[key] === undefined || row[key] === null) clean[key] = '';
                    else if (typeof row[key] === 'string') {
                        clean[key] = row[key].replace(/[\x00-\x1F\x7F-\x9F]/g, '');
                    } else clean[key] = row[key];
                }
                return clean;
            });

            var resp = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '?cors=true', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(cleanData)
            });

            if (!resp.ok) throw new Error('Ошибка ' + resp.status);

            isSaving = false;
            isOnline = true;
            setStatus('online', 'Онлайн ✅');
            showSaving(false, '💾 Сохранено');
            saveToLocalStorage();
            showToast('💾 Данные сохранены в облаке (' + data.length + ' записей)', 'success');
        } catch (e) {
            console.error('Ошибка сохранения:', e);
            isSaving = false;
            isOnline = false;
            setStatus('offline', 'Офлайн ✏️');
            showSaving(false, '📁 Локально');
            saveToLocalStorage();
            showToast('⚠️ Ошибка: ' + e.message + '. Данные сохранены локально.', 'error');
        }
    }

    function scheduleSave() {
        clearTimeout(saveTimeout);
        showSaving(true, 'Сохранение...');
        saveTimeout = setTimeout(function() {
            if (isOnline) saveToCloud();
            else { saveToLocalStorage(); showSaving(false, '📁 Локально'); }
        }, 1000);
    }

    // ================================================================
    // ИНДИКАТОРЫ
    // ================================================================
    function setStatus(type, text) {
        var dot = document.getElementById('statusDot');
        var el = document.getElementById('statusText');
        dot.className = 'dot';
        if (type === 'online') dot.classList.add('online');
        else if (type === 'offline') dot.classList.add('offline');
        else dot.classList.add('loading');
        el.textContent = text;
    }

    function showSaving(active, text) {
        document.getElementById('savingSpinner').style.display = active ? 'inline-block' : 'none';
        if (text) document.getElementById('savingText').textContent = text;
    }

    // ================================================================
    // РЕНДЕР
    // ================================================================
    function render() {
        var thead = document.getElementById('headerRow');
        var tbody = document.getElementById('tableBody');

        var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
        var filterStatus = document.getElementById('filterStatus').value;
        var filterAmountMin = parseFloat(document.getElementById('filterAmountMin').value);
        var filterAmountMax = parseFloat(document.getElementById('filterAmountMax').value);
        var filterDateFrom = document.getElementById('filterDateFrom').value;
        var filterDateTo = document.getElementById('filterDateTo').value;

        // Генерация заголовков с сортировкой
        var headerHtml = '<th style="width:30px;"><input type="checkbox" onchange="toggleAllSelect(this.checked)" /></th>';
        columns.forEach(function(col) {
            if (visibleColumns[col.key] === false) return;
            var sortClass = '';
            if (sortColumn === col.key) {
                sortClass = sortDirection === 1 ? 'sort-asc' : 'sort-desc';
            }
            headerHtml += '<th class="' + sortClass + '" onclick="sortTable(\'' + col.key + '\')">' + col.label;
            headerHtml += '<div class="col-actions">';
            headerHtml += '<button onclick="removeColumn(\'' + col.key + '\')" title="Удалить столбец">✕</button>';
            headerHtml += '</div></th>';
        });
        headerHtml += '<th style="width:120px;">Действия</th>';
        thead.innerHTML = headerHtml;

        // Фильтрация
        var filtered = data.filter(function(row) {
            var matchText = false;
            columns.forEach(function(col) {
                var val = row[col.key] || '';
                if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
            });
            var statusMatch = filterStatus === '' || row.status === filterStatus;
            var amountMatch = true;
            if (!isNaN(filterAmountMin) && row.amount < filterAmountMin) amountMatch = false;
            if (!isNaN(filterAmountMax) && row.amount > filterAmountMax) amountMatch = false;
            var dateMatch = true;
            if (filterDateFrom && row.date < filterDateFrom) dateMatch = false;
            if (filterDateTo && row.date > filterDateTo) dateMatch = false;
            return matchText && statusMatch && amountMatch && dateMatch;
        });

        // Сортировка
        if (sortColumn) {
            filtered.sort(function(a, b) {
                var valA = a[sortColumn] || '';
                var valB = b[sortColumn] || '';
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return -sortDirection;
                if (valA > valB) return sortDirection;
                return 0;
            });
        }

        if (!filtered.length) {
            var colCount = columns.filter(function(c) { return visibleColumns[c.key] !== false; }).length + 2;
            tbody.innerHTML = '<tr><td colspan="' + colCount + '"><div class="empty-state"><span class="emoji">📭</span><p>Нет записей</p></div></td></tr>';
            document.getElementById('countBadge').textContent = data.length;
            updateCounters();
            return;
        }

        var html = '';
        filtered.forEach(function(row, idx) {
            var statusClass = (row.status || 'Черновик').toLowerCase().replace(/ /g, '');
            var isSelected = selectedIds.indexOf(row.id) !== -1;
            html += '<tr class="status-' + statusClass + (isSelected ? ' selected' : '') + '">';
            html += '<td class="td-checkbox"><input type="checkbox" ' + (isSelected ? 'checked' : '') + ' onchange="toggleSelect(' + row.id + ', this.checked)" /></td>';

            columns.forEach(function(col) {
                if (visibleColumns[col.key] === false) return;
                html += '<td data-label="' + col.label + '">';
                html += renderCell(row, col);
                html += '</td>';
            });

            html += '<td data-label="Действия">';
            html += '<button class="btn-sm btn-sm-copy" onclick="copyRow(' + row.id + ')" title="Копировать">📋</button> ';
            html += '<button class="btn-sm btn-sm-del" onclick="deleteRow(' + row.id + ')" title="Удалить">🗑</button>';
            html += '</td>';
            html += '</tr>';
        });

        tbody.innerHTML = html;
        document.getElementById('countBadge').textContent = data.length;
        updateCounters();
        updateMassActions();
    }

    function renderCell(row, col) {
        var value = row[col.key] !== undefined ? row[col.key] : '';
        var id = row.id;
        var key = col.key;

        switch(col.type) {
            case 'checkbox':
                var checked = value ? 'checked' : '';
                return '<input type="checkbox" ' + checked + ' onchange="updateField(' + id + ', \'' + key + '\', this.checked)" />';

            case 'select':
                var options = col.options || ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'];
                var html = '<select class="table-select" onchange="updateField(' + id + ', \'' + key + '\', this.value)">';
                options.forEach(function(opt) {
                    html += '<option value="' + opt + '" ' + (opt === value ? 'selected' : '') + '>' + opt + '</option>';
                });
                html += '</select>';
                return html;

            case 'number':
                return '<input class="table-input" type="number" value="' + (value || 0) + '" onchange="updateField(' + id + ', \'' + key + '\', Number(this.value))" />';

            case 'date':
                var dateVal = value || '';
                return '<input class="table-input" type="date" value="' + dateVal + '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" />';

            default:
                if (key === 'status') {
                    var statusLabels = {
                        'Согласовано': '✅ Согласовано',
                        'Отказ': '❌ Отказ',
                        'В работе': '⚡ В работе',
                        'Отправлено': '📤 Отправлено',
                        'Черновик': '📝 Черновик'
                    };
                    var displayValue = statusLabels[value] || value;
                    return '<span class="status-cell">' + displayValue + '</span>';
                }
                return '<input class="table-input" type="text" value="' + escapeHtml(String(value)) + '" onchange="updateField(' + id + ', \'' + key + '\', this.value)" />';
        }
    }

    function updateCounters() {
        document.getElementById('rowCounter').textContent = data.length;
        var agreedCount = data.filter(function(r) { return r.agreed === true; }).length;
        document.getElementById('agreedCounter').textContent = agreedCount;
        var total = data.reduce(function(sum, r) { return sum + (r.amount || 0); }, 0);
        document.getElementById('totalAmount').textContent = total.toLocaleString('ru-RU');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ================================================================
    // СОРТИРОВКА
    // ================================================================
    function sortTable(key) {
        if (sortColumn === key) {
            sortDirection *= -1;
        } else {
            sortColumn = key;
            sortDirection = 1;
        }
        render();
    }

    // ================================================================
    // ВЫДЕЛЕНИЕ И МАССОВЫЕ ДЕЙСТВИЯ
    // ================================================================
    function toggleSelect(id, checked) {
        if (checked) {
            if (selectedIds.indexOf(id) === -1) selectedIds.push(id);
        } else {
            selectedIds = selectedIds.filter(function(i) { return i !== id; });
        }
        render();
    }

    function toggleAllSelect(checked) {
        var filtered = getFilteredData();
        selectedIds = [];
        if (checked) {
            filtered.forEach(function(row) {
                if (selectedIds.indexOf(row.id) === -1) selectedIds.push(row.id);
            });
        }
        render();
    }

    function getFilteredData() {
        var filterText = document.getElementById('filterInput').value.toLowerCase().trim();
        var filterStatus = document.getElementById('filterStatus').value;
        var filterAmountMin = parseFloat(document.getElementById('filterAmountMin').value);
        var filterAmountMax = parseFloat(document.getElementById('filterAmountMax').value);
        var filterDateFrom = document.getElementById('filterDateFrom').value;
        var filterDateTo = document.getElementById('filterDateTo').value;

        return data.filter(function(row) {
            var matchText = false;
            columns.forEach(function(col) {
                var val = row[col.key] || '';
                if (String(val).toLowerCase().indexOf(filterText) !== -1) matchText = true;
            });
            var statusMatch = filterStatus === '' || row.status === filterStatus;
            var amountMatch = true;
            if (!isNaN(filterAmountMin) && row.amount < filterAmountMin) amountMatch = false;
            if (!isNaN(filterAmountMax) && row.amount > filterAmountMax) amountMatch = false;
            var dateMatch = true;
            if (filterDateFrom && row.date < filterDateFrom) dateMatch = false;
            if (filterDateTo && row.date > filterDateTo) dateMatch = false;
            return matchText && statusMatch && amountMatch && dateMatch;
        });
    }

    function updateMassActions() {
        document.getElementById('selectedCount').textContent = selectedIds.length;
        var show = selectedIds.length > 0;
        document.getElementById('massDeleteBtn').style.display = show ? 'inline-flex' : 'none';
        document.getElementById('massStatusSelect').style.display = show ? 'inline-flex' : 'none';
        document.getElementById('massStatusBtn').style.display = show ? 'inline-flex' : 'none';
    }

    function massDelete() {
        if (!selectedIds.length) return;
        if (!confirm('Удалить ' + selectedIds.length + ' записей?')) return;
        data = data.filter(function(r) { return selectedIds.indexOf(r.id) === -1; });
        selectedIds = [];
        render();
        scheduleSave();
        showToast('🗑️ Удалено записей: ' + (data.length - selectedIds.length), 'success');
    }

    function massStatus() {
        if (!selectedIds.length) return;
        var status = document.getElementById('massStatusSelect').value;
        if (!status) { showToast('Выберите статус', 'error'); return; }
        data.forEach(function(r) {
            if (selectedIds.indexOf(r.id) !== -1) r.status = status;
        });
        selectedIds = [];
        render();
        scheduleSave();
        showToast('📝 Статус обновлён для ' + selectedIds.length + ' записей', 'success');
    }

    // ================================================================
    // УПРАВЛЕНИЕ СТОЛБЦАМИ
    // ================================================================
    function showColumnSettings() {
        var modal = document.getElementById('columnSettingsModal');
        var list = document.getElementById('columnSettingsList');
        var html = '';
        columns.forEach(function(col) {
            var checked = visibleColumns[col.key] !== false ? 'checked' : '';
            html += '<label><input type="checkbox" ' + checked + ' onchange="toggleColumnVisibility(\'' + col.key + '\', this.checked)" /> ' + col.label + '</label>';
        });
        list.innerHTML = html;
        modal.classList.add('active');
    }

    function toggleColumnVisibility(key, visible) {
        visibleColumns[key] = visible;
        localStorage.setItem('crm_visible_columns', JSON.stringify(visibleColumns));
        render();
    }

    function showAddColumnModal() {
        document.getElementById('addColumnModal').classList.add('active');
        document.getElementById('newColumnKey').value = '';
        document.getElementById('newColumnLabel').value = '';
        document.getElementById('newColumnType').value = 'text';
        document.getElementById('selectOptionsContainer').style.display = 'none';
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(function(m) { m.classList.remove('active'); });
    }

    document.getElementById('newColumnType').addEventListener('change', function() {
        document.getElementById('selectOptionsContainer').style.display = this.value === 'select' ? 'block' : 'none';
    });

    function addColumn() {
        var key = document.getElementById('newColumnKey').value.trim();
        var label = document.getElementById('newColumnLabel').value.trim() || key;
        var type = document.getElementById('newColumnType').value;
        var optionsStr = document.getElementById('newColumnOptions').value.trim();

        if (!key) { showToast('Введите название столбца', 'error'); return; }
        if (columns.some(function(c) { return c.key === key; })) {
            showToast('Столбец с таким ключом уже существует', 'error');
            return;
        }

        var newCol = { key: key, label: label, type: type };
        if (type === 'select' && optionsStr) {
            newCol.options = optionsStr.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
        }

        columns.push(newCol);
        visibleColumns[key] = true;

        data.forEach(function(row) {
            if (type === 'checkbox') row[key] = false;
            else if (type === 'number') row[key] = 0;
            else if (type === 'select' && newCol.options && newCol.options.length) row[key] = newCol.options[0];
            else if (type === 'date') row[key] = new Date().toISOString().slice(0, 10);
            else row[key] = '';
        });

        saveToLocalStorage();
        render();
        closeModal();
        showToast('✅ Столбец "' + label + '" добавлен', 'success');
        if (isOnline) scheduleSave();
    }

    function removeColumn(key) {
        if (!confirm('Удалить столбец "' + key + '"? Все данные в нём будут потеряны.')) return;
        columns = columns.filter(function(c) { return c.key !== key; });
        delete visibleColumns[key];
        data.forEach(function(row) { delete row[key]; });
        saveToLocalStorage();
        render();
        showToast('🗑️ Столбец удалён', 'success');
        if (isOnline) scheduleSave();
    }

    // ================================================================
    // ДЕЙСТВИЯ
    // ================================================================
    function updateField(id, field, value) {
        var row = data.find(function(r) { return r.id === id; });
        if (row) {
            row[field] = value;
            render();
            scheduleSave();
        }
    }

    function deleteRow(id) {
        if (!confirm('Удалить эту запись?')) return;
        data = data.filter(function(r) { return r.id !== id; });
        selectedIds = selectedIds.filter(function(i) { return i !== id; });
        render();
        scheduleSave();
    }

    function copyRow(id) {
        var row = data.find(function(r) { return r.id === id; });
        if (!row) return;
        var newRow = { id: nextId++ };
        columns.forEach(function(col) {
            if (col.type === 'checkbox') newRow[col.key] = false;
            else if (col.type === 'number') newRow[col.key] = row[col.key] || 0;
            else if (col.type === 'select' && col.options && col.options.length) {
                newRow[col.key] = row[col.key] || col.options[0];
            } else if (col.key === 'date') {
                newRow[col.key] = row[col.key] || new Date().toISOString().slice(0, 10);
            } else {
                newRow[col.key] = row[col.key] || '';
            }
        });
        data.push(newRow);
        render();
        scheduleSave();
        showToast('📋 Запись скопирована', 'success');
    }

    function addRow() {
        var newRow = { id: nextId++ };
        columns.forEach(function(col) {
            if (col.type === 'checkbox') newRow[col.key] = false;
            else if (col.type === 'number') newRow[col.key] = 0;
            else if (col.type === 'select' && col.options && col.options.length) newRow[col.key] = col.options[0];
            else if (col.key === 'date') newRow[col.key] = new Date().toISOString().slice(0, 10);
            else newRow[col.key] = '';
        });
        if (!newRow.client) newRow.client = 'Новый клиент';
        if (!newRow.proposal) newRow.proposal = 'Новое КП';
        if (!newRow.status) newRow.status = 'Черновик';

        data.push(newRow);
        render();
        scheduleSave();
        var tbody = document.getElementById('tableBody');
        var last = tbody.lastElementChild;
        if (last) last.scrollIntoView({ behavior: 'smooth' });
    }

    function resetData() {
        if (data.length && !confirm('Сбросить всё к примеру?')) return;

        columns = [
            { key: 'client', label: 'Клиент', type: 'text' },
            { key: 'proposal', label: 'КП (название)', type: 'text' },
            { key: 'amount', label: 'Сумма', type: 'number' },
            { key: 'date', label: 'Дата КП', type: 'date' },
            { key: 'status', label: 'Статус', type: 'select', options: ['В работе', 'Отказ', 'Отправлено', 'Согласовано', 'Черновик'] },
            { key: 'agreed', label: 'Согласен', type: 'checkbox' },
            { key: 'comment', label: 'Комментарий', type: 'text' },
            { key: 'phone', label: 'Телефон', type: 'text' },
            { key: 'email', label: 'Email', type: 'text' }
        ];
        columns.forEach(function(col) { visibleColumns[col.key] = true; });

        var defaultData = [
            { client: 'ИП Иванов', proposal: 'Ремонт оборудования', amount: 450000, date: '2026-01-10', status: 'В работе', agreed: true, comment: 'Доп. согласование', phone: '+7 912 345-67-89', email: 'ivanov@mail.ru' },
            { client: 'ООО ЛогистикПро', proposal: 'Транспортные услуги', amount: 670000, date: '2026-01-12', status: 'Отказ', agreed: false, comment: 'Нашли дешевле', phone: '+7 912 345-67-90', email: 'logist@pro.ru' }
        ];

        data = defaultData.map(function(r, i) {
            var copy = {};
            for (var key in r) copy[key] = r[key];
            copy.id = i + 1;
            return copy;
        });
        nextId = data.length + 1;
        selectedIds = [];
        sortColumn = null;
        saveToLocalStorage();
        render();
        if (isOnline) scheduleSave();
        showToast('🔄 Данные сброшены', 'success');
    }

    // ================================================================
    // CSV
    // ================================================================
    function exportCSV() {
        if (!data.length) return showToast('Нет данных для экспорта', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var headers = visible.map(function(c) { return c.label; });
        var rows = data.map(function(r) {
            return visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return '"' + String(val).replace(/"/g, '""') + '"';
            });
        });
        var csv = [headers.join(',')];
        rows.forEach(function(row) { csv.push(row.join(',')); });
        csv = csv.join('\n');
        var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'клиенты_' + new Date().toISOString().slice(0, 10) + '.csv';
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('📤 CSV скачан', 'success');
    }

    function handleImport(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            var text = ev.target.result;
            var lines = text.split('\n').filter(function(l) { return l.trim(); });

            if (lines.length < 2) { showToast('Файл пуст или неверный формат', 'error'); return; }

            var headerLine = lines[0];
            var headers = headerLine.split(',').map(function(h) { return h.trim().replace(/^"|"$/g, ''); });

            var colMap = {};
            headers.forEach(function(h, index) {
                columns.forEach(function(col) {
                    if (col.label === h || col.key === h) colMap[index] = col.key;
                });
            });

            var imported = [];
            for (var i = 1; i < lines.length; i++) {
                var cols = lines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, ''); });
                var row = { id: nextId++ };
                columns.forEach(function(col) {
                    if (col.type === 'checkbox') row[col.key] = false;
                    else if (col.type === 'number') row[col.key] = 0;
                    else if (col.type === 'select' && col.options && col.options.length) row[col.key] = col.options[0];
                    else if (col.key === 'date') row[col.key] = new Date().toISOString().slice(0, 10);
                    else row[col.key] = '';
                });

                for (var j = 0; j < cols.length; j++) {
                    var key = colMap[j];
                    if (key) {
                        var col = columns.find(function(c) { return c.key === key; });
                        if (col) {
                            if (col.type === 'checkbox') {
                                row[key] = cols[j] === 'Да' || cols[j] === 'TRUE' || cols[j] === 'true' || cols[j] === '1';
                            } else if (col.type === 'number') {
                                row[key] = parseFloat(cols[j]) || 0;
                            } else {
                                row[key] = cols[j] || '';
                            }
                        }
                    }
                }

                var hasData = false;
                columns.forEach(function(col) {
                    var val = row[col.key];
                    if (val && val !== '' && val !== 0 && val !== false) hasData = true;
                });
                if (hasData) imported.push(row);
            }

            if (imported.length) {
                data = imported;
                saveToLocalStorage();
                render();
                if (isOnline) scheduleSave();
                showToast('✅ Импортировано ' + imported.length + ' записей', 'success');
            } else {
                showToast('Не удалось импортировать данные', 'error');
            }
        };
        reader.readAsText(file, 'UTF-8');
        event.target.value = '';
    }

    function exportToClipboard() {
        if (!data.length) return showToast('Нет данных', 'error');
        var visible = columns.filter(function(c) { return visibleColumns[c.key] !== false; });
        var tsv = visible.map(function(c) { return c.label; }).join('\t') + '\n';
        data.forEach(function(r) {
            var row = visible.map(function(c) {
                var val = r[c.key] !== undefined ? r[c.key] : '';
                if (c.type === 'checkbox') val = val ? 'Да' : 'Нет';
                return String(val);
            });
            tsv += row.join('\t') + '\n';
        });
        navigator.clipboard.writeText(tsv).then(function() {
            showToast('📋 Скопировано', 'success');
        }).catch(function() {
            showToast('Не удалось скопировать', 'error');
        });
    }

    // ================================================================
    // TOAST
    // ================================================================
    var toastTimeout;

    function showToast(msg, type) {
        type = type || '';
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast';
        if (type) el.classList.add(type);
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(function() { el.classList.remove('show'); }, 3000);
    }

    // ================================================================
    // ФИЛЬТРЫ
    // ================================================================
    document.getElementById('filterInput').addEventListener('input', render);
    document.getElementById('filterStatus').addEventListener('change', render);
    document.getElementById('filterAmountMin').addEventListener('input', render);
    document.getElementById('filterAmountMax').addEventListener('input', render);
    document.getElementById('filterDateFrom').addEventListener('change', render);
    document.getElementById('filterDateTo').addEventListener('change', render);

    document.querySelectorAll('.modal').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    });

    // ================================================================
    // ЗАПУСК
    // ================================================================
    loadFromCloud();

    console.log('⚡ CRM загружена!');
    console.log('🔑 BIN_ID:', BIN_ID);
    console.log('🔑 API_KEY:', API_KEY ? '✅ Установлен' : '❌ НЕ УСТАНОВЛЕН');
    console.log('📊 Колонок:', columns.length);
    console.log('🌐 GitHub Pages режим: используется ?cors=true');
    console.log('🌓 Тёмная/светлая тема: доступна');
</script>
